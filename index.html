      return;
    }

    currentChild = document.getElementById("childSelect").value;
    editingIndex = null;
    editingChild = false;
    document.getElementById("taskInput").value = "";
    document.getElementById("taskInputDe").value = "";
    document.getElementById("taskIconInput").value = "";
    document.getElementById("taskPointsInput").value = "10";
    saveChildren();
    renderChildren();
    loadData();
  }

  function startEditChild() {
    if (!isParentMode) {
      return;
    }

    editingChild = true;
    document.getElementById("childNameInput").value = currentChild;
    renderChildren();
    document.getElementById("childNameInput").focus();
  }

  function saveChildName() {
    if (!isParentMode) {
      return;
    }

    const input = document.getElementById("childNameInput");
    const oldName = currentChild;
    const newName = input.value.trim();

    if (newName === "") {
      return;
    }

    if (newName !== oldName && children.includes(newName)) {
      alert("Такой ребенок уже есть");
      return;
    }

    const oldKey = getStorageKey(oldName);
    const newKey = getStorageKey(newName);
    const currentData = normalizeChildData(safeParseJSON(localStorage.getItem(oldKey), {
      tasks: tasks,
      points: points,
      claimedRewards: claimedRewards,
      rewardRequests: rewardRequests
    }));
    const childIndex = children.indexOf(oldName);

    if (childIndex !== -1) {
      children[childIndex] = newName;
    }

    currentChild = newName;
    currentData.rewardRequests = currentData.rewardRequests.map(function(request) {
      return Object.assign({}, request, { child: newName });
    });
    localStorage.setItem(newKey, JSON.stringify(currentData));

    if (newKey !== oldKey) {
      localStorage.removeItem(oldKey);
    }

    editingChild = false;
    saveChildren();
    renderChildren();
    loadData();
  }

  function addChild() {
    if (!isParentMode) {
      return;
    }

    let name = prompt("Имя нового ребенка:");

    if (name === null) {
      return;
    }

    name = name.trim();

    if (name === "") {
      return;
    }

    if (children.includes(name)) {
      alert("Такой ребенок уже есть");
      return;
    }

    children.push(name);
    currentChild = name;
    tasks = getDefaultTasks();
    points = 0;
    claimedRewards = [];
    rewardRequests = [];
    rewards = getDefaultRewards();
    editingIndex = null;
    editingChild = false;

    saveChildren();
    saveData();
    renderChildren();
    loadData();
  }

  function deleteChild() {
    if (!isParentMode) {
      return;
    }

    if (children.length === 1) {
      alert("Нельзя удалить последнего ребенка");
      return;
    }

    const confirmed = confirm("Удалить ребенка " + currentChild + " и все его задачи?");

    if (!confirmed) {
      return;
    }

    const deletedChild = currentChild;
    const deletedIndex = children.indexOf(deletedChild);
    children = children.filter(function(child) {
      return child !== deletedChild;
    });

    currentChild = children[deletedIndex] || children[deletedIndex - 1] || children[0];
    editingIndex = null;
    editingChild = false;

    localStorage.removeItem(getStorageKey(deletedChild));
    saveChildren();
    renderChildren();
    loadData();
  }

  function renderTasks() {
    const taskList = document.getElementById("taskList");

    if (!taskList) {
      return;
    }

    updateKidSummary();
    taskList.innerHTML = "";
    updateCategoryInputs();
    renderTaskFilters();
    renderCategoryManagement();
    let visibleTaskCount = 0;

    getCategories().forEach(function(category) {
      const categoryTasks = tasks
        .map(function(task, index) {
          return { task: task, index: index };
        })
        .filter(function(item) {
          const matchesCategory = getTaskCategoryId(item.task) === category;
          const matchesCurrentMode = isParentMode ? taskMatchesFilter(item.task) : !item.task.done;

          return matchesCategory && matchesCurrentMode;
        });

      if (categoryTasks.length === 0 && !(isParentMode && isCustomCategory(category))) {
        return;
      }

      visibleTaskCount += categoryTasks.length;
      const completedCount = categoryTasks.filter(function(item) {
        return item.task.done;
      }).length;
      const isExpanded = expandedCategories.includes(category);
      const categoryCard = document.createElement("div");
      categoryCard.className = "category-card";

      if (isCustomCategory(category)) {
        categoryCard.classList.add("custom-category");
      }

      const header = document.createElement("div");
      header.className = "category-header";

      const toggleButton = document.createElement("button");
      toggleButton.className = "category-toggle-button";
      toggleButton.onclick = function() {
        toggleCategory(category);
      };

      const title = document.createElement("span");
      title.className = "category-title";
      title.innerText = getCategoryIcon(category) + " " + getCategoryName(category);

      const count = document.createElement("span");
      count.className = "category-count";
      count.innerText = completedCount + "/" + categoryTasks.length + " " + (isExpanded ? "▲" : "▼");

      toggleButton.appendChild(title);
      toggleButton.appendChild(count);
      header.appendChild(toggleButton);

      if (isCustomCategory(category)) {
        const categoryActions = document.createElement("div");
        categoryActions.className = "category-actions";

        const editCategoryButton = document.createElement("button");
        editCategoryButton.className = "secondary-button";
        editCategoryButton.innerText = "✏️";
        editCategoryButton.title = "Редактировать категорию";
        editCategoryButton.onclick = function() {
          renameCustomCategory(category);
        };

        const deleteCategoryButton = document.createElement("button");
        deleteCategoryButton.className = "delete-button";
        deleteCategoryButton.innerText = "🗑️";
        deleteCategoryButton.title = "Удалить категорию";
        deleteCategoryButton.onclick = function() {
          deleteCustomCategory(category);
        };

        categoryActions.appendChild(editCategoryButton);
        categoryActions.appendChild(deleteCategoryButton);
        header.appendChild(categoryActions);
      }

      categoryCard.appendChild(header);

      if (isExpanded) {
        const categoryBody = document.createElement("div");
        categoryBody.className = "category-tasks";

        if (categoryTasks.length === 0) {
          const emptyCategory = document.createElement("div");
          emptyCategory.className = "task-empty";
          emptyCategory.innerText = "В этой категории пока нет задач";
          categoryBody.appendChild(emptyCategory);
        } else {
          categoryTasks.forEach(function(item) {
            categoryBody.appendChild(createTaskElement(item.task, item.index));
          });
        }

        categoryCard.appendChild(categoryBody);
      }

      taskList.appendChild(categoryCard);
    });

    if (visibleTaskCount === 0) {
      const emptyMessage = document.createElement("div");
      emptyMessage.className = "task-empty";
      emptyMessage.innerText = "Нет задач по выбранному фильтру";
      taskList.appendChild(emptyMessage);
      editingIndex = null;
      return;
    }

    if (editingIndex !== null) {
      const editInput = document.getElementById("editInputRu" + editingIndex);

      if (editInput) {
        editInput.focus();
      }
    }
  }

      taskElement.style.opacity = "0.5";
    }

      taskElement.classList.add("task-just-done");
    }

    if (editingIndex === index) {
      taskElement.classList.add("task-editing");

      const form = document.createElement("div");
      form.className = "task-edit-form";

      function makeField(labelText, inputEl) {
        const field = document.createElement("div");
        field.className = "task-edit-field";
        const lbl = document.createElement("label");
        lbl.innerText = labelText;
        field.appendChild(lbl);
        field.appendChild(inputEl);
        return field;
      }

      const inputRu = document.createElement("input");
      inputRu.id = "editInputRu" + index;

      inputRu.onkeydown = function(event) {
        if (event.key === "Enter") saveEdit(index);
      };

      const inputDe = document.createElement("input");
      inputDe.id = "editInputDe" + index;
      inputDe.value = task.titleDe || "";
      inputDe.placeholder = "Название DE";

      };

      const pointsInput = document.createElement("input");

      pointsInput.type = "number";
      pointsInput.min = "1";

        if (event.key === "Enter") saveEdit(index);

  function renderRewards() {
    const rewardList = document.getElementById("rewardList");
    const parentRewardList = document.getElementById("parentRewardList");

    rewardList.innerHTML = "";
    if (parentRewardList) {
      parentRewardList.innerHTML = "";
    }

    getRewardsForDisplay().forEach(function(reward) {
      const isClaimed = claimedRewards.includes(reward.id);
      const pendingRequest = getPendingRewardRequest(reward.id);
      const canRequest = points >= reward.cost && !isClaimed && !pendingRequest;
      const rewardElement = document.createElement("div");
      rewardElement.className = "reward";

      if (isClaimed) {
        rewardElement.classList.add("reward-claimed");
      }

      if (justClaimedRewardId === reward.id) {
        rewardElement.classList.add("reward-just-claimed");
      }

      if (editingRewardId === reward.id) {
        const editBox = document.createElement("div");
        editBox.className = "reward-edit";

        const titleInput = document.createElement("input");
        titleInput.id = "rewardTitle" + reward.id;
        titleInput.value = reward.title;

        const costInput = document.createElement("input");
        costInput.id = "rewardCost" + reward.id;
        costInput.className = "reward-cost-input";
        costInput.type = "number";
        costInput.min = "1";
        costInput.value = reward.cost;

        const saveButton = document.createElement("button");
        saveButton.className = "reward-button";
        saveButton.innerText = "Сохранить";
        saveButton.onclick = function() {
          saveReward(reward.id);
        };

        editBox.appendChild(titleInput);
        editBox.appendChild(costInput);
        editBox.appendChild(saveButton);
        rewardElement.appendChild(editBox);
      } else {
        const info = document.createElement("div");
        info.className = "reward-info";

        const title = document.createElement("p");
        title.className = "reward-name";
        title.innerText = getRewardIcon(reward) + " " + reward.title;

        const cost = document.createElement("p");
        cost.className = "reward-cost";
        cost.innerText = reward.cost + " ⭐";

        const progress = document.createElement("div");
        progress.className = "reward-progress";

        const progressFill = document.createElement("div");
        progressFill.className = "reward-progress-fill";
        progressFill.style.width = Math.min(100, Math.round((points / reward.cost) * 100)) + "%";

        const left = document.createElement("span");
        left.className = "reward-left";
        left.innerText = pendingRequest
          ? t("pending")
          : (points >= reward.cost
            ? t("availableNow")
            : t("notEnough") + " " + (reward.cost - points) + " ⭐");

        progress.appendChild(progressFill);

        const actions = document.createElement("div");
        actions.className = "reward-actions";

        const button = document.createElement("button");
        button.className = "reward-button";
        button.innerText = isClaimed ? t("received") : (pendingRequest ? t("pending") : (canRequest ? t("request") : t("notEnough")));
        button.disabled = isClaimed || Boolean(pendingRequest) || !canRequest;

        if ((!canRequest || pendingRequest) && !isClaimed) {
          button.classList.add("locked");
        }

        button.onclick = function() {
          requestReward(reward.id);
        };

        info.appendChild(title);
        info.appendChild(cost);
        info.appendChild(progress);
        info.appendChild(left);
        rewardElement.appendChild(info);
        actions.appendChild(button);

        if (justClaimedRewardId === reward.id) {
          const status = document.createElement("span");
          status.className = "reward-status";
          status.innerText = t("received").toLowerCase();
          actions.appendChild(status);
        }

        if (isParentMode) {
          const editButton = document.createElement("button");
          editButton.className = "secondary-button";
          editButton.innerText = "✏️";
          editButton.title = "Редактировать награду";
          editButton.onclick = function() {
            editReward(reward.id);
          };

          actions.appendChild(editButton);

          const deleteButton = document.createElement("button");
          deleteButton.className = "delete-button";
          deleteButton.innerText = "🗑️";
          deleteButton.title = "Удалить награду";
          deleteButton.onclick = function() {
            deleteReward(reward.id);
          };

          actions.appendChild(deleteButton);
        }

        rewardElement.appendChild(actions);
      }

      const targetList = activeTab === "parent" && parentRewardList ? parentRewardList : rewardList;
      targetList.appendChild(rewardElement);
    });

    if (editingRewardId !== null) {
      const rewardInput = document.getElementById("rewardTitle" + editingRewardId);

      if (rewardInput) {
        rewardInput.focus();
      }
    }

    renderRewardRequests();
  }

      return;
    }

    const input = document.getElementById("taskInput");
    const inputDe = document.getElementById("taskInputDe");
    const pointsInput = document.getElementById("taskPointsInput");

  function loadCleaningTemplate() {
    if (!isParentMode) {
      return;
    }

    const result = mergeCleaningTemplate(tasks);
    tasks = result.tasks;

    saveData();
    renderTasks();
    updateCategoryInputs();

  function loadCleaningTemplateForAllChildren() {
    if (!isParentMode) {
      return;
    }

    let addedCount = 0;
    let updatedCount = 0;
    let skippedCount = 0;

    children.forEach(function(child) {
      const storageKey = getStorageKey(child);
      const savedData = localStorage.getItem(storageKey);
      const data = normalizeChildData(safeParseJSON(savedData, getInitialChildData()));
      const result = mergeCleaningTemplate(data.tasks);

      data.tasks = result.tasks;
      localStorage.setItem(storageKey, JSON.stringify(data));

      addedCount += result.addedCount;
      updatedCount += result.updatedCount;
      skippedCount += result.skippedCount;

      if (child === currentChild) {
        tasks = result.tasks;
        points = data.points || 0;
        claimedRewards = data.claimedRewards || [];
        rewardRequests = data.rewardRequests || [];
        rewards = data.rewards || getDefaultRewards();
      }
    });

    saveChildren();
    renderTasks();
    renderRewards();
    renderRanking();
    updatePoints();

    showTemplateMessage({ addedCount: addedCount, updatedCount: updatedCount, skippedCount: skippedCount });
  }

  function resetCurrentChildPoints() {
    if (!isParentMode) {
      return;
    }

    const shouldClearHistory = shouldClearHistoryOnPointsReset();
    const confirmMessage = shouldClearHistory
      ? "Сбросить баллы, очистить историю текущего ребёнка и вернуть все выполненные задачи в список?"
      : "Сбросить баллы и вернуть все выполненные задачи в список?";

    if (!confirm(confirmMessage)) {
      return;
    }

    const resetAmount = Math.max(0, Number(points) || 0);
    points = 0;
    tasks = resetTaskCompletionState(tasks);
    addStarTransaction("reset", resetAmount > 0 ? -resetAmount : 0, "Сброс баллов", currentChild);

    if (shouldClearHistory) {
      taskHistory = taskHistory.filter(function(entry) {
        return entry.child !== currentChild;
      });
      saveTaskHistory();
    }

    saveData();
    renderTasks();
    renderRewards();
    renderRanking();
    renderHistory();
    renderStarTransactions();
    renderProgressHistory();
    updatePoints();
    alert(shouldClearHistory ? "Баллы и история сброшены, задачи снова активны" : "Баллы сброшены, задачи снова активны");
  }

  function resetAllChildrenPoints() {
    if (!isParentMode) {
      return;
    }

    const shouldClearHistory = shouldClearHistoryOnPointsReset();
    const confirmMessage = shouldClearHistory
      ? "Сбросить баллы, очистить всю историю и вернуть все выполненные задачи в список?"
      : "Сбросить баллы у всех детей и вернуть все выполненные задачи в список?";

    tasks = resetTaskCompletionState(tasks);

  function shouldClearHistoryOnPointsReset() {
    const checkbox = document.getElementById("resetHistoryCheckbox");
    return Boolean(checkbox && checkbox.checked);
  }

  function resetTaskCompletionState(taskList) {
    return taskList.map(function(task) {
      return Object.assign({}, task, {
        done: false,
        completed: false,
        lastCompletedAt: null,
        completedPoints: null,
        updatedAt: getNowIso()
      });
    });
  }

  function mergeCleaningTemplate(taskList) {
    const mergedTasks = taskList.slice();
    let addedCount = 0;
    let updatedCount = 0;
    let skippedCount = 0;

    cleaningTemplateTasks.forEach(function(templateTask) {
      const templateCategoryId = normalizeCategoryId(templateTask.category);
      const templateCategoryName = normalizeCategoryName(templateCategoryId);
      const taskIndex = mergedTasks.findIndex(function(task) {
        return normalizeTaskName(task.titleRu || task.text || task.title) === normalizeTaskName(templateTask.title);
      });

      if (taskIndex === -1) {
        mergedTasks.push({
          text: templateTask.title,
          titleRu: templateTask.title,
          titleDe: templateTask.titleDe || "",
          points: templateTask.points,
          frequency: templateTask.frequency,
          categoryId: templateCategoryId,
          category: templateCategoryName,
          icon: templateTask.icon || getTaskIcon(templateTask),
          done: Boolean(templateTask.completed),
          lastCompletedAt: null,
          completedPoints: null,
          updatedAt: getNowIso()
        });
        addedCount += 1;
        return;
      }

      const currentTask = mergedTasks[taskIndex];
      const hasChanges = (currentTask.titleRu || currentTask.text) !== templateTask.title ||
        currentTask.points !== templateTask.points ||
        currentTask.frequency !== templateTask.frequency ||
        getTaskCategoryId(currentTask) !== templateCategoryId;

      if (hasChanges) {
        mergedTasks[taskIndex] = {
          text: templateTask.title,
          titleRu: templateTask.title,
          titleDe: currentTask.titleDe || templateTask.titleDe || "",
          points: templateTask.points,
          frequency: templateTask.frequency,
          categoryId: templateCategoryId,
          category: templateCategoryName,
          icon: currentTask.icon || templateTask.icon || getTaskIcon(templateTask),
          done: currentTask.done,
          lastCompletedAt: currentTask.lastCompletedAt || null,
          completedPoints: currentTask.completedPoints || null,
          updatedAt: getNowIso()
        };
        updatedCount += 1;
      } else {
        skippedCount += 1;
      }
    });

    return {
      tasks: mergedTasks,
      addedCount: addedCount,
      updatedCount: updatedCount,
      skippedCount: skippedCount
    };
  }

  function showTemplateMessage(result) {
    if (result.updatedCount > 0) {
      alert("Шаблон обновлён");
    } else if (result.addedCount > 0 && result.skippedCount > 0) {
      alert("Новые задачи добавлены, дубликаты пропущены");
    } else {
      alert("Шаблон уборки загружен");
    }
  }

  function toggleDone(index, buttonElement) {
    if (!tasks[index]) {
      return;
    }

    const taskPoints = tasks[index].points;
    const wasDone = tasks[index].done;
    const previousTask = Object.assign({}, tasks[index]);
    const previousPoints = points;
    const previousHistory = taskHistory.slice();
    const previousStarTransactions = starTransactions.slice();
    const shouldDelayTaskRender = !wasDone && !isParentMode;

    if (buttonElement && !wasDone) {
      buttonElement.disabled = true;
    }

    if (wasDone) {
      const pointsToRemove = Number(tasks[index].completedPoints || taskPoints);
      tasks[index].done = false;
      tasks[index].lastCompletedAt = null;
      tasks[index].completedPoints = null;
      tasks[index].updatedAt = getNowIso();
      points = Math.max(0, points - pointsToRemove);
      try {
        addStarTransaction("refund", -pointsToRemove, "Отмена задачи: " + getTaskTitle(tasks[index]), currentChild);
      } catch (error) {
        tasks[index] = previousTask;
        points = previousPoints;
        starTransactions = previousStarTransactions;

        try {
          saveStarTransactions();
        } catch (historyError) {
          // Keep the in-memory rollback even if localStorage is unavailable.
        }

        if (buttonElement) {
          buttonElement.disabled = false;
        }

        return;
      }
      justCompletedTaskIndex = null;
      justCompletedTaskPoints = 0;
    } else {
      tasks[index].done = true;
      tasks[index].lastCompletedAt = getTodayString();
      tasks[index].completedPoints = taskPoints;
      tasks[index].updatedAt = getNowIso();
      points += taskPoints;
      justCompletedTaskIndex = index;
      justCompletedTaskPoints = taskPoints;
      try {
        addTaskHistory(tasks[index], taskPoints);
        addStarTransaction("earn", taskPoints, "Задача: " + getTaskTitle(tasks[index]), currentChild);
      } catch (error) {
        tasks[index] = previousTask;
        points = previousPoints;
        taskHistory = previousHistory;
        starTransactions = previousStarTransactions;
        justCompletedTaskIndex = null;
        justCompletedTaskPoints = 0;

        try {
          saveTaskHistory();
          saveStarTransactions();
        } catch (historyError) {
          // Keep the in-memory rollback even if localStorage is unavailable.
        }

        if (buttonElement) {
          buttonElement.disabled = false;
        }

        return;
      }
    }

    try {
      saveData();
    } catch (error) {
      tasks[index] = previousTask;
      points = previousPoints;
      taskHistory = previousHistory;
      starTransactions = previousStarTransactions;
      justCompletedTaskIndex = null;
      justCompletedTaskPoints = 0;

      try {
        saveTaskHistory();
        saveStarTransactions();
      } catch (historyError) {
        // Keep the in-memory rollback even if localStorage is unavailable.
      }

      if (buttonElement) {
        buttonElement.disabled = false;
      }

      return;
    }

    if (!wasDone) {
      showTaskCompleteAnimation(taskPoints, buttonElement);
    }

    const refreshAfterToggle = function() {
      renderTasks();
      renderRewards();
      renderHistory();
      renderStarTransactions();
      renderProgressHistory();
      updatePoints();
    };

    if (shouldDelayTaskRender) {
      updatePoints();
      renderRewards();
      renderHistory();
      renderStarTransactions();
      renderProgressHistory();

      setTimeout(function() {
        refreshAfterToggle();
      }, 700);
    } else {
      refreshAfterToggle();
    }

    if (justCompletedTaskIndex === index) {
      setTimeout(function() {
        if (justCompletedTaskIndex === index) {
          justCompletedTaskIndex = null;
          justCompletedTaskPoints = 0;
          renderTasks();
        }
      }, 900);
    }
  }

  function getPendingRewardRequest(rewardId) {
    return rewardRequests.find(function(request) {
      return request.rewardId === rewardId && request.child === currentChild && request.status === "pending";
    }) || null;
  }

  function requestReward(rewardId) {
    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward || claimedRewards.includes(rewardId) || points < reward.cost) {
      return;
    }

    if (getPendingRewardRequest(rewardId)) {
      renderRewards();
      return;
    }

    const previousRequests = rewardRequests.slice();
    rewardRequests.push({
      id: "reward_request_" + Date.now() + "_" + Math.random().toString(16).slice(2),
      child: currentChild,
      rewardId: reward.id,
      rewardTitle: reward.title,
      cost: reward.cost,
      status: "pending",
      createdAt: new Date().toISOString()
    });

    try {
      saveData();
    } catch (error) {
      rewardRequests = previousRequests;
      return;
    }

    renderRewards();
    showRewardFirework();
  }

  function claimReward(rewardId) {
    requestReward(rewardId);
  }

  function getChildDataForRewardRequest(child) {
    if (child === currentChild) {
      return normalizeChildData({
        tasks: tasks,
        points: points,
        claimedRewards: claimedRewards,
        rewards: rewards,
        rewardRequests: rewardRequests,
        language: language
      });
    }

    return normalizeChildData(safeParseJSON(localStorage.getItem(getStorageKey(child)), getInitialChildData()));
  }

  function saveChildDataForRewardRequest(child, data) {
    const normalizedData = normalizeChildData(data);

    if (child === currentChild) {
      tasks = normalizedData.tasks;
      points = normalizedData.points;
      claimedRewards = normalizedData.claimedRewards;
      rewards = normalizedData.rewards;
      rewardRequests = normalizedData.rewardRequests;
      language = normalizedData.language;
      saveData();
      return;
    }

    localStorage.setItem(getStorageKey(child), JSON.stringify(normalizedData));
    saveChildren();
  }

  function getAllRewardRequests() {
    return children.flatMap(function(child) {
      return getChildDataForRewardRequest(child).rewardRequests;
    });
  }

  function findRewardRequestOwner(requestId) {
    for (let index = 0; index < children.length; index += 1) {
      const child = children[index];
      const data = getChildDataForRewardRequest(child);
      const requestIndex = data.rewardRequests.findIndex(function(request) {
        return request.id === requestId;
      });

      if (requestIndex !== -1) {
        return {
          child: child,
          data: data,
          requestIndex: requestIndex,
          request: data.rewardRequests[requestIndex]
        };
      }
    }

    return null;
  }

  function approveRewardRequest(requestId) {
    if (!isParentMode) {
      return;
    }

    const owner = findRewardRequestOwner(requestId);

    if (!owner || owner.request.status !== "pending") {
      return;
    }

    if (owner.data.points < owner.request.cost) {
      alert("Недостаточно звёзд");
      return;
    }

    const previousStarTransactions = starTransactions.slice();
    owner.data.points = Math.max(0, owner.data.points - owner.request.cost);
    owner.data.rewardRequests[owner.requestIndex] = Object.assign({}, owner.request, { status: "approved" });

    if (!owner.data.claimedRewards.includes(owner.request.rewardId)) {
      owner.data.claimedRewards.push(owner.request.rewardId);
    }

    try {
      addStarTransaction("spend", -owner.request.cost, "Награда: " + owner.request.rewardTitle, owner.child);
      saveChildDataForRewardRequest(owner.child, owner.data);
    } catch (error) {
      starTransactions = previousStarTransactions;
      saveStarTransactions();
      return;
    }

    renderRewards();
    renderRanking();
    renderHistory();
    renderStarTransactions();
    renderProgressHistory();
    updatePoints();
    showRewardFirework();
    alert("Награда подтверждена");
  }

  function rejectRewardRequest(requestId) {
    if (!isParentMode) {
      return;
    }

    const owner = findRewardRequestOwner(requestId);

    if (!owner || owner.request.status !== "pending") {
      return;
    }

    owner.data.rewardRequests[owner.requestIndex] = Object.assign({}, owner.request, { status: "rejected" });

    try {
      saveChildDataForRewardRequest(owner.child, owner.data);
    } catch (error) {
      return;
    }

    renderRewards();
    alert("Запрос отклонён");
  }

  function renderRewardRequests() {
    const list = document.getElementById("rewardRequestsList");

    if (!list) {
      return;
    }

    list.innerHTML = "";

    const pendingRequests = getAllRewardRequests()
      .filter(function(request) {
        return request.status === "pending";
      })
      .sort(function(first, second) {
        return String(first.createdAt || "").localeCompare(String(second.createdAt || ""));
      });

    if (pendingRequests.length === 0) {
      const empty = document.createElement("div");
      empty.className = "history-empty";
      empty.innerText = "Нет ожидающих запросов";
      list.appendChild(empty);
      return;
    }

    pendingRequests.forEach(function(request) {
      const card = document.createElement("div");
      card.className = "reward-request-card";

      const title = document.createElement("div");
      title.className = "reward-request-title";
      title.innerText = request.child + " · " + request.rewardTitle;

      const meta = document.createElement("div");
      meta.className = "reward-request-meta";
      meta.innerText = request.cost + " ⭐ · " + new Date(request.createdAt).toLocaleString("ru-RU");

      const actions = document.createElement("div");
      actions.className = "inline-control-row";

      const approveButton = document.createElement("button");
      approveButton.className = "reward-button";
      approveButton.innerText = "Подтвердить";
      approveButton.onclick = function() {
        approveRewardRequest(request.id);
      };

      const rejectButton = document.createElement("button");
      rejectButton.className = "delete-button";
      rejectButton.innerText = "Отклонить";
      rejectButton.onclick = function() {
        rejectRewardRequest(request.id);
      };

      actions.appendChild(approveButton);
      actions.appendChild(rejectButton);
      card.appendChild(title);
      card.appendChild(meta);
      card.appendChild(actions);
      list.appendChild(card);
    });
  }

  function editReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    editingRewardId = rewardId;
    renderRewards();
  }

  function addReward() {
    if (!isParentMode) {
      return;
    }

    const nameInput = document.getElementById("rewardNameInput");
    const costInput = document.getElementById("rewardCostInput");
    const title = nameInput.value.trim();
    const cost = Number(costInput.value);

    if (title === "" || cost <= 0) {
      return;
    }

    rewards.push({
      id: "reward_" + Date.now(),
      title: title,
      cost: cost,
      updatedAt: getNowIso()
    });

    nameInput.value = "";
    costInput.value = "30";

    saveData();
    renderRewards();
  }

  function saveReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    const titleInput = document.getElementById("rewardTitle" + rewardId);
    const costInput = document.getElementById("rewardCost" + rewardId);
    const title = titleInput.value.trim();
    const cost = Number(costInput.value);

    if (title === "" || cost <= 0) {
      return;
    }

    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward) {
      return;
    }

    reward.title = title;
    reward.cost = cost;
    reward.updatedAt = getNowIso();
    editingRewardId = null;

    saveData();
    renderRewards();
  }

  function deleteReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward) {
      return;
    }

    if (!confirm("Удалить награду \"" + reward.title + "\"?")) {
      return;
    }

    rewards = rewards.filter(function(item) {
      return item.id !== rewardId;
    });
    claimedRewards = claimedRewards.filter(function(id) {
      return id !== rewardId;
    });

    if (editingRewardId === rewardId) {
      editingRewardId = null;
    }

    saveData();
    renderRewards();
  }

  function editTask(index) {
    if (!isParentMode) {
      return;
    }

    editingIndex = index;
    renderTasks();
  }

  function saveEdit(index) {
    if (!isParentMode) {
      return;
    }

    const inputRu = document.getElementById("editInputRu" + index);
    const inputDe = document.getElementById("editInputDe" + index);
    const pointsInput = document.getElementById("editPointsInput" + index);
    const categoryInput = document.getElementById("editCategoryInput" + index);
    const iconInput = document.getElementById("editIconInput" + index);

    if (!tasks[index] || !inputRu || !inputDe || !pointsInput || !categoryInput || !iconInput) {
      editingIndex = null;
      renderTasks();
      return;
    }

    const titleRu = inputRu.value.trim();
    const titleDe = inputDe.value.trim();
    const taskPoints = Number(pointsInput.value);
    const taskCategoryId = normalizeCategoryId(categoryInput.value);
    const taskCategory = normalizeCategoryName(taskCategoryId);
    const taskIcon = iconInput.value.trim();

    if (titleRu === "" || taskPoints <= 0) {
      return;
    }

    tasks[index].text = titleRu;
    tasks[index].titleRu = titleRu;
    tasks[index].titleDe = titleDe;
    tasks[index].points = taskPoints;
    tasks[index].categoryId = taskCategoryId;
    tasks[index].category = taskCategory;
    tasks[index].icon = taskIcon || getTaskIcon({ text: titleRu, titleRu: titleRu, titleDe: titleDe });
    tasks[index].updatedAt = getNowIso();
    editingIndex = null;

    saveData();
    renderTasks();
  }

  function deleteTask(index) {
    if (!isParentMode) {
      return;
    }

    if (!tasks[index]) {
      return;
    }

    if (tasks[index].done) {
      points = Math.max(0, points - Number(tasks[index].completedPoints || tasks[index].points));
    }

    tasks.splice(index, 1);

    if (editingIndex === index) {
      editingIndex = null;
    } else if (editingIndex > index) {
      editingIndex -= 1;
    }

    saveData();
    renderTasks();
  }

  function showPwaUpdateBanner(worker) {
    pendingServiceWorker = worker || pendingServiceWorker;
    const banner = document.getElementById("updateBanner");

    if (banner) {
      banner.classList.add("active");
    }
  }

  function hidePwaUpdateBanner() {
    const banner = document.getElementById("updateBanner");

    if (banner) {
      banner.classList.remove("active");
    }
  }

  function applyPwaUpdate() {
    if (!pendingServiceWorker) {
      window.location.reload();
      return;
    }

    pendingServiceWorker.postMessage({ type: "SKIP_WAITING" });
  }

  function trackServiceWorkerUpdate(registration) {
    if (!registration) {
      return;
    }

    if (registration.waiting && navigator.serviceWorker.controller) {
      showPwaUpdateBanner(registration.waiting);
    }

    registration.addEventListener("updatefound", function() {
      const newWorker = registration.installing;

      if (!newWorker) {
        return;
      }

      newWorker.addEventListener("statechange", function() {
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          showPwaUpdateBanner(newWorker);
        }
      });
    });
  }

  function registerServiceWorker() {
    if (!("serviceWorker" in navigator)) {
      return;
    }

    navigator.serviceWorker.addEventListener("controllerchange", function() {
      if (isRefreshingForPwaUpdate) {
        return;
      }

      isRefreshingForPwaUpdate = true;
      window.location.reload();
    });

    navigator.serviceWorker.addEventListener("message", function(event) {
      if (event.data && event.data.type === "NEW_VERSION_READY") {
        navigator.serviceWorker.getRegistration().then(function(registration) {
          showPwaUpdateBanner(registration && registration.waiting);
        });
      }
    });

    window.addEventListener("load", function() {
      navigator.serviceWorker.register("service-worker.js").then(function(registration) {
        trackServiceWorkerUpdate(registration);
        registration.update();
      });
    });
  }

  async function startApp() {
    setSyncStatus("Работает локально", "local");
    await initializeCloudSync();
    loadChildren();
    if (shouldRunDailyReset()) {
      resetAllTasksForNewDay(false);
    }
    loadData();
    scheduleMidnightReset();
    registerServiceWorker();
  }

  startApp();
</script>
