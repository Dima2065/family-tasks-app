<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Family Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#70c99b">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, #eef5f1 100%);
      margin: 0;
      min-height: 100vh;
      padding: 18px 18px 86px;
      color: #263238;
    }

    h1 {
      text-align: center;
      margin: 8px 0 18px;
      font-size: 28px;
      color: #263238;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mode-label {
      display: none;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e7f6ee;
      color: #245444;
      font-size: 13px;
      font-weight: bold;
    }

    .mode-label.active {
      display: inline-flex;
    }

    .parent-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: 10px 0;
    }

    .logout-button {
      display: none;
      padding: 9px 12px;
      border-radius: 14px;
      font-size: 13px;
    }

    .logout-button.active {
      display: inline-flex;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      padding: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(65, 92, 86, 0.16);
      backdrop-filter: blur(12px);
    }

    .child-select,
    .add-task {
      display: flex;
      gap: 10px;
      margin: 16px 0;
      align-items: center;
    }

    .add-task {
      gap: 8px;
      margin: 10px 0;
      flex-wrap: nowrap;
    }

    .add-task input,
    .add-task select {
      padding: 7px 9px;
      border-radius: 12px;
      font-size: 14px;
    }

    #taskInput {
      flex: 1 1 auto;
    }

    #taskPointsInput {
      flex: 0 0 66px;
      width: 66px;
      max-width: 66px;
      padding-left: 4px;
      padding-right: 4px;
      text-align: center;
    }

    #taskCategoryInput {
      flex: 0 0 120px;
      width: 120px;
    }

    .add-task-button {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .child-select {
      align-items: stretch;
      flex-direction: column;
    }

    .child-row,
    .child-edit {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .task-points-field {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6c8078;
      font-size: 13px;
      white-space: nowrap;
    }

    .task-points-input {
      max-width: 82px;
      text-align: center;
    }

    .task-category-select {
      min-width: 0;
    }

    input,
    select {
      flex: 1;
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid #d8e4de;
      border-radius: 16px;
      font-size: 16px;
      background: #fbfffd;
      color: #263238;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    input:focus,
    select:focus {
      border-color: #78b99c;
      box-shadow: 0 0 0 4px rgba(120, 185, 156, 0.16);
    }

    label {
      font-weight: bold;
      color: #526760;
    }

    #points {
      display: none;
    }

    .task {
      background: #ffffff;
      padding: 9px 10px;
      margin: 6px 0;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(64, 84, 78, 0.05);
      border: 1px solid #edf3f0;
    }

    .category-card {
      background: #ffffff;
      margin: 9px 0;
      border-radius: 16px;
      box-shadow: 0 8px 18px rgba(64, 84, 78, 0.08);
      border: 1px solid #edf3f0;
      overflow: hidden;
    }

    .category-header {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #f6fbf8;
      color: #2f4d43;
      box-shadow: none;
      text-align: left;
    }

    .category-header:hover {
      background: #eaf4ee;
      box-shadow: none;
    }

    .category-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-count {
      color: #6c8078;
      font-size: 13px;
      white-space: nowrap;
    }

    .category-tasks {
      padding: 4px 8px 8px;
    }

    .category-tasks .task {
      margin: 6px 0;
      padding: 8px 9px;
      box-shadow: none;
      background: #fbfffd;
    }

    .task-empty {
      padding: 14px 12px;
      margin: 10px 0;
      border-radius: 16px;
      background: #f6fbf8;
      border: 1px solid #edf3f0;
      color: #6c8078;
      text-align: center;
      font-size: 14px;
    }

    .task-filters {
      display: flex;
      gap: 6px;
      margin: 10px 0 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .task-filters::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f2f7f4;
      color: #557166;
      border: 1px solid #d8e8df;
      box-shadow: none;
      font-size: 13px;
    }

    .filter-button.active {
      background: #70c99b;
      color: #ffffff;
      border-color: #70c99b;
    }

    .filter-button:hover {
      box-shadow: none;
    }

    .parent-filter-block .section-title {
      margin-top: 8px;
    }

    .parent-section {
      margin: 8px 0;
      overflow: hidden;
      border: 1px solid #edf3f0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(64, 84, 78, 0.06);
    }

    .parent-section-header {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f6fbf8;
      color: #2f4d43;
      box-shadow: none;
      text-align: left;
    }

    .parent-section-header:hover {
      box-shadow: none;
    }

    .parent-section-body {
      display: none;
      padding: 10px;
    }

    .parent-section.expanded .parent-section-body {
      display: block;
    }

    .parent-section .child-select,
    .parent-section .add-task,
    .parent-section .add-reward,
    .parent-section .sync-row,
    .parent-section .reminder-settings {
      margin: 0;
    }

    .parent-section .template-button,
    .parent-section .sync-button,
    .parent-section .add-reward button,
    .parent-section .reminder-settings button {
      min-height: 38px;
    }

    .parent-section .template-button + .template-button {
      margin-top: 8px;
    }

    .parent-reward-list {
      margin-top: 8px;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 18px;
      color: #2f4d43;
    }

    .reward {
      background: #ffffff;
      padding: 12px;
      margin: 8px 0;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(64, 84, 78, 0.08);
      border: 1px solid #edf3f0;
    }

    .reward-info {
      flex: 1;
      min-width: 0;
    }

    .reward-name {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: bold;
      color: #263238;
    }

    .reward-cost {
      margin: 0;
      font-size: 13px;
      color: #6c8078;
    }

    .reward-claimed {
      opacity: 0.62;
    }

    .reward-just-claimed {
      animation: rewardPop 0.65s ease;
      border-color: #70c99b;
      background: #f0fff7;
    }

    @keyframes rewardPop {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(1.025);
        box-shadow: 0 12px 24px rgba(69, 173, 122, 0.2);
      }

      100% {
        transform: scale(1);
      }
    }

    .reward-button {
      padding: 9px 12px;
      border-radius: 14px;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(69, 173, 122, 0.2);
    }

    .reward-button.locked {
      background: #d4ded9;
      color: #6c8078;
      cursor: default;
      box-shadow: none;
    }

    .reward-status {
      color: #45ad7a;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .reward-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .reward-edit {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .reward-cost-input {
      max-width: 92px;
    }

    .add-reward {
      display: flex;
      gap: 8px;
      margin: 8px 0 10px;
      align-items: center;
    }

    .add-reward input {
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .add-reward .reward-cost-input {
      flex: 0 0 86px;
      max-width: 86px;
      text-align: center;
    }

    .add-reward button {
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0 12px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 14px;
      border: 1px solid #edf3f0;
      background: #fbfffd;
      color: #263238;
      font-size: 14px;
    }

    .ranking-item.leader {
      background: #fff9df;
      border-color: #f1d985;
    }

    .ranking-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: bold;
    }

    .ranking-points {
      flex: 0 0 auto;
      color: #245444;
      font-weight: bold;
      white-space: nowrap;
    }

    .history-panel {
      margin-top: 8px;
    }

    .history-filters {
      display: flex;
      gap: 8px;
      margin: 8px 0 10px;
      align-items: center;
    }

    .history-filters select,
    .history-filters input {
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid #edf3f0;
      border-radius: 14px;
      background: #fbfffd;
      color: #263238;
      font-size: 13px;
    }

    .history-info {
      min-width: 0;
    }

    .history-task {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: bold;
    }

    .history-meta,
    .history-empty {
      color: #8a9c95;
      font-size: 12px;
    }

    .history-points {
      flex: 0 0 auto;
      color: #245444;
      font-weight: bold;
      white-space: nowrap;
    }

    .task span,
    .task-edit-input,
    .task-content {
      flex: 1;
      line-height: 1.18;
      font-size: 14px;
      min-width: 0;
    }

    .task-title {
      color: #263238;
      font-weight: bold;
      display: -webkit-box;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: normal;
    }

    .task-main {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .task-icon {
      flex: 0 0 auto;
      max-width: 24px;
      margin-top: 0;
      line-height: 1;
      text-align: center;
      font-size: 16px;
    }

    .task-points {
      color: #6c8078;
      font-size: 13px;
    }

    .task-meta {
      display: block;
      margin-top: 3px;
      color: #8a9c95;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-completed-at {
      display: block;
      margin-top: 2px;
      color: #6fb28c;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-edit {
      display: flex;
      flex: 1;
      gap: 8px;
      align-items: center;
    }

    .task-icon-input {
      flex: 0 0 44px;
      width: 44px;
      max-width: 44px;
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      align-items: flex-start;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    button {
      background: linear-gradient(180deg, #70c99b 0%, #45ad7a 100%);
      color: white;
      border: none;
      padding: 13px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 8px 16px rgba(69, 173, 122, 0.26);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .done-button,
    .icon-button,
    .secondary-button,
    .delete-button {
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
      box-shadow: none;
    }

    .secondary-button,
    .icon-button {
      background: #f2f7f4;
      color: #557166;
      box-shadow: none;
      border: 1px solid #d8e8df;
    }

    .secondary-button:hover,
    .icon-button:hover {
      background: #e5efe9;
    }

    .delete-button {
      background: #fff1f1;
      color: #b44a4a;
      box-shadow: none;
      border: 1px solid #f1d1d1;
    }

    .delete-button:hover {
      background: #f8e1e1;
    }

    .child-save-button {
      padding: 10px 14px;
      border-radius: 14px;
    }

    .template-button {
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(69, 173, 122, 0.18);
    }

    .sync-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    .sync-status {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: #f2f7f4;
      color: #557166;
      font-size: 12px;
      text-align: center;
    }

    .sync-status.synced {
      background: #e7f6ee;
      color: #245444;
    }

    .sync-status.error {
      background: #fff1f1;
      color: #b44a4a;
    }

    .sync-button {
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(69, 173, 122, 0.18);
    }

    .kid-summary {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0 0 10px;
      padding: 10px;
      border-radius: 18px;
      background: #f6fbf8;
      border: 1px solid #edf3f0;
      text-align: center;
    }

    .kid-summary span {
      font-size: 18px;
      font-weight: bold;
      color: #263238;
    }

    .kid-summary strong {
      color: #245444;
      font-size: 20px;
    }

    .kid-summary small {
      color: #6c8078;
      font-size: 13px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      width: min(430px, 100%);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid #dfe9e3;
      box-shadow: 0 -8px 24px rgba(64, 84, 78, 0.12);
    }

    .bottom-nav button {
      width: 100%;
      padding: 9px 4px;
      border-radius: 14px;
      background: #f2f7f4;
      color: #557166;
      box-shadow: none;
      font-size: 12px;
    }

    .bottom-nav button.active {
      background: #70c99b;
      color: #ffffff;
    }

    .progress-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .progress-card {
      padding: 12px;
      border-radius: 16px;
      background: #f6fbf8;
      border: 1px solid #edf3f0;
    }

    .progress-card span {
      display: block;
      color: #6c8078;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .progress-card strong {
      color: #245444;
      font-size: 20px;
    }

    .reward-progress {
      height: 8px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5efe9;
    }

    .reward-progress-fill {
      height: 100%;
      border-radius: inherit;
      background: #70c99b;
    }

    .reward-left {
      display: block;
      margin-top: 5px;
      color: #8a9c95;
      font-size: 12px;
    }

    .reminder-settings {
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    .reminder-settings input[type="time"] {
      flex: 0 0 82px;
      max-width: 82px;
      padding: 7px 8px;
      font-size: 13px;
      text-align: center;
    }

    .reminder-settings input[type="text"] {
      padding: 7px 9px;
      font-size: 13px;
    }

    .reminder-settings button {
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    .parent-only {
      display: none;
    }

    .parent-mode .parent-only {
      display: flex;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(69, 173, 122, 0.3);
    }

    .secondary-button:hover,
    .icon-button:hover,
    .delete-button:hover {
      transform: translateY(-1px);
      box-shadow: none;
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 5px 12px rgba(69, 173, 122, 0.22);
    }

    button:disabled {
      background: #b8c5bf;
      cursor: default;
      box-shadow: none;
      transform: none;
      opacity: 0.65;
    }

    @media (max-width: 420px) {
      body {
        padding: 0 0 96px;
        background: #f7fbff;
      }

      .app {
        width: 100%;
        min-height: calc(100vh - 96px);
        border-radius: 0;
        border: none;
        box-shadow: none;
        padding: 10px 10px 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      body:not(.parent-mode) .child-select,
      body:not(.parent-mode) .parent-actions,
      body:not(.parent-mode) #parentModeLabel,
      body:not(.parent-mode) #points {
        display: none;
      }

      .top-bar {
        justify-content: flex-end;
        margin-bottom: 0;
      }

      .kid-summary span {
        font-size: 17px;
      }

      .kid-summary strong {
        font-size: 20px;
      }

      .kid-summary small {
        font-size: 12px;
      }

      .task-filters {
        gap: 5px;
        margin: 6px 0;
        overflow-x: auto;
        padding-bottom: 0;
      }

      body:not(.parent-mode) .filter-button {
        padding: 6px 10px;
        font-size: 12px;
      }

      body:not(.parent-mode) .filter-button.more-filter {
        display: none;
      }

      .category-card {
        margin: 7px 0;
        border-radius: 14px;
      }

      .category-header {
        min-height: 40px;
        padding: 9px 10px;
        gap: 8px;
      }

      .category-title {
        font-size: 13px;
      }

      .category-count {
        font-size: 12px;
      }

      .category-tasks {
        padding: 3px 6px 7px;
      }

      .category-tasks .task,
      .task {
        gap: 8px;
        margin: 5px 0;
        padding: 9px 8px;
      }

      .task-main {
        gap: 6px;
      }

      .task-icon {
        max-width: 22px;
        font-size: 16px;
      }

      .task-title {
        line-height: 1.2;
        font-size: 14px;
      }

      .task-meta {
        margin-top: 4px;
        color: #45ad7a;
        font-size: 13px;
        font-weight: bold;
      }

      .add-task {
        flex-wrap: wrap;
      }

      #taskInput {
        flex: 1 0 100%;
      }

      #taskPointsInput {
        flex: 0 0 66px;
        max-width: 66px;
      }

      #taskCategoryInput {
        flex: 1 1 0;
        width: auto;

        points: task.points,
        frequency: task.frequency,
        category: task.category,
        icon: task.icon || getTaskIcon(task),
        done: task.done,
        lastCompletedAt: task.lastCompletedAt || null,
        completedPoints: task.completedPoints || null
      };
    });
  }

  function normalizeTasks(taskList) {
    return taskList.map(function(task) {
      const taskText = task.text || task.title || "";
      const taskPoints = Number(task.points || task.reward || 10);
      const isDone = Boolean(task.done || task.completed);

      return {
        text: taskText,
        points: taskPoints > 0 ? taskPoints : 10,
        frequency: task.frequency || "",
        category: normalizeCategoryName(task.category),
        icon: task.icon || getTaskIcon({ text: taskText, title: task.title }),
        done: isDone,
        lastCompletedAt: task.lastCompletedAt || (isDone ? getTodayString() : null),
        completedPoints: isDone ? Number(task.completedPoints || taskPoints) : null
      };
    }).filter(function(task) {
      return task.text.trim() !== "";
    });
  }

  function getTodayString() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");

    return year + "-" + month + "-" + day;
  }

  function parseDateString(dateString) {
    if (!dateString) {
      return null;
    }

    const parts = String(dateString).split("-").map(Number);

    if (parts.length !== 3 || parts.some(function(part) { return !part; })) {
      return null;
    }

    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function getDaysSince(dateString) {
    const completedDate = parseDateString(dateString);

    if (!completedDate) {
      return 0;
    }

    const today = parseDateString(getTodayString());
    const dayMs = 24 * 60 * 60 * 1000;

    return Math.floor((today - completedDate) / dayMs);
  }

  function shouldResetTask(task) {
    if (!task.done || !task.lastCompletedAt) {
      return false;
    }

    const frequency = String(task.frequency || "").toLowerCase();
    const daysSinceCompleted = getDaysSince(task.lastCompletedAt);

    if (frequency === "ежедневно") {
      return daysSinceCompleted >= 1;
    }

    if (frequency === "2–3 раза в неделю" || frequency === "2-3 раза в неделю") {
      return daysSinceCompleted >= 2;
    }

    if (frequency === "1 раз в неделю") {
      return daysSinceCompleted >= 7;
    }

    return false;
  }

  function resetTasksByFrequency(taskList) {
    let hasChanges = false;

    const resetTasks = taskList.map(function(task) {
      if (!shouldResetTask(task)) {
        return task;
      }

      hasChanges = true;

      return Object.assign({}, task, { done: false, completedPoints: null });
    });

    return {
      tasks: resetTasks,
      hasChanges: hasChanges
    };
  }

  function getCompletedAtLabel(task) {
    if (!task.done || !task.lastCompletedAt) {
      return "";
    }

    if (task.lastCompletedAt === getTodayString()) {
      return "выполнено сегодня";
    }

    const completedDate = parseDateString(task.lastCompletedAt);

    if (!completedDate) {
      return "";
    }

    return "выполнено: " + completedDate.toLocaleDateString("ru-RU");
  }

  function normalizeTaskName(name) {
    return String(name || "").trim().toLowerCase();
  }

  function safeParseJSON(value, fallback) {
    if (!value) {
      return fallback;
    }

    try {
      const parsedValue = JSON.parse(value);
      return parsedValue === null ? fallback : parsedValue;
    } catch (error) {
      return fallback;
    }
  }

  function uniqueList(list) {
    if (!Array.isArray(list)) {
      return [];
    }

    return list
      .map(function(item) {
        return String(item || "").trim();
      })
      .filter(function(item, index, source) {
        return item !== "" && source.indexOf(item) === index;
      });
  }

  function isFirebaseConfigured() {
    return Boolean(firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId);
  }

  function setSyncStatus(message, state) {
    const syncStatus = document.getElementById("syncStatus");

    if (!syncStatus) {
      return;
    }

    syncStatus.innerText = message;
    syncStatus.classList.toggle("synced", state === "synced");
    syncStatus.classList.toggle("error", state === "error");
  }

  function initFirebase() {
    if (cloudReady) {
      return true;
    }

    if (!isFirebaseConfigured() || typeof firebase === "undefined" || !firebase.firestore) {
      setSyncStatus("Работает локально", "local");
      return false;
    }

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      cloudDb = firebase.firestore();
      cloudReady = true;
      return true;
    } catch (error) {
      cloudReady = false;
      setSyncStatus("Ошибка синхронизации", "error");
      return false;
    }
  }

  function getLocalSnapshot() {
    const snapshotChildren = uniqueList(safeParseJSON(localStorage.getItem("children"), children.length ? children : defaultChildren.slice()));
    const childData = {};

    snapshotChildren.forEach(function(child) {
      const savedData = safeParseJSON(localStorage.getItem(getStorageKey(child)), null);
      childData[child] = normalizeChildData(savedData || (child === currentChild ? {
        tasks: tasks,
        points: points,
        claimedRewards: claimedRewards,
        rewards: rewards
      } : getInitialChildData()));
    });

    return {
      children: snapshotChildren,
      currentChild: localStorage.getItem("currentChild") || currentChild || snapshotChildren[0],
      childData: childData,
      rewards: normalizeRewards(safeParseJSON(localStorage.getItem("rewards"), rewards)),
      parentMode: localStorage.getItem("parentMode") === "true",
      expandedCategories: uniqueList(safeParseJSON(localStorage.getItem("expandedCategories"), expandedCategories)),
      activeTaskFilter: localStorage.getItem("activeTaskFilter") || activeTaskFilter,
      taskHistory: normalizeHistory(safeParseJSON(localStorage.getItem("taskHistory"), taskHistory)),
      reminderSettings: normalizeReminderSettings(safeParseJSON(localStorage.getItem("taskReminderSettings"), reminderSettings)),
      categories: categoryOrder.slice(),
      uncategorizedName: uncategorizedName,
      updatedAt: new Date().toISOString()
    };
  }

  function applySnapshotToLocal(snapshot) {
    if (!snapshot || typeof snapshot !== "object") {
      return false;
    }

    const snapshotChildren = uniqueList(snapshot.children);
    const nextChildren = snapshotChildren.length > 0 ? snapshotChildren : defaultChildren.slice();
    const nextCurrentChild = snapshot.currentChild && nextChildren.includes(snapshot.currentChild)
      ? snapshot.currentChild
      : nextChildren[0];
    const childData = snapshot.childData && typeof snapshot.childData === "object" ? snapshot.childData : {};

    localStorage.setItem("children", JSON.stringify(nextChildren));
    localStorage.setItem("currentChild", nextCurrentChild);
    localStorage.setItem("rewards", JSON.stringify(normalizeRewards(snapshot.rewards)));
    localStorage.setItem("parentMode", snapshot.parentMode === true ? "true" : "false");
    localStorage.setItem("expandedCategories", JSON.stringify(uniqueList(snapshot.expandedCategories || []).map(normalizeCategoryName)));
    localStorage.setItem("activeTaskFilter", snapshot.activeTaskFilter || "all");
    localStorage.setItem("taskHistory", JSON.stringify(normalizeHistory(snapshot.taskHistory)));
    localStorage.setItem("taskReminderSettings", JSON.stringify(normalizeReminderSettings(snapshot.reminderSettings)));

    nextChildren.forEach(function(child) {
      localStorage.setItem(getStorageKey(child), JSON.stringify(normalizeChildData(childData[child] || getInitialChildData())));
    });

    return true;
  }

  async function loadFromCloud() {
    if (!initFirebase()) {
      return null;
    }

    try {
      const doc = await cloudDb.collection(cloudCollectionName).doc(cloudDocumentId).get();

      if (!doc.exists) {
        setSyncStatus("Работает локально", "local");
        return null;
      }

      const data = doc.data();

      if (!data || !Array.isArray(data.children)) {
        setSyncStatus("Работает локально", "local");
        return null;
      }

      setSyncStatus("Синхронизировано", "synced");
      return data;
    } catch (error) {
      setSyncStatus("Ошибка синхронизации", "error");
      return null;
    }
  }

  async function saveToCloud() {
    if (isApplyingCloudData || !initFirebase()) {
      return false;
    }

    try {
      await cloudDb.collection(cloudCollectionName).doc(cloudDocumentId).set(getLocalSnapshot());
      setSyncStatus("Синхронизировано", "synced");
      return true;
    } catch (error) {
      setSyncStatus("Ошибка синхронизации", "error");
      return false;
    }
  }

  function scheduleCloudSave() {
    if (isApplyingCloudData) {
      return;
    }

    if (cloudSaveTimer) {
      clearTimeout(cloudSaveTimer);
    }

    cloudSaveTimer = setTimeout(function() {
      saveToCloud();
    }, 500);
  }

  async function syncLocalToCloud() {
    return saveToCloud();
  }

  async function syncCloudToLocal() {
    const cloudData = await loadFromCloud();

    if (!cloudData) {
      return null;
    }

    isApplyingCloudData = true;
    applySnapshotToLocal(cloudData);
    isApplyingCloudData = false;
    setSyncStatus("Синхронизировано", "synced");

    return cloudData;
  }

  async function initializeCloudSync() {
    const cloudData = await syncCloudToLocal();

    if (!cloudData) {
      await syncLocalToCloud();
    }
  }

  async function syncNow() {
    setSyncStatus("Синхронизация...", "local");
    const cloudData = await syncCloudToLocal();

    if (!cloudData) {
      await syncLocalToCloud();
    }

    loadChildren();
    loadData();
  }

  function getInitialChildData() {
    return {
      tasks: getDefaultTasks(),
      points: 0,
      claimedRewards: [],
      rewards: getDefaultRewards()
    };
  }

  function normalizeChildData(data) {
    const childData = data && typeof data === "object" ? data : getInitialChildData();
    const normalizedPoints = Number(childData.points);
    const hasSavedTaskList = Array.isArray(childData.tasks);
    const rawTasks = hasSavedTaskList ? childData.tasks : getDefaultTasks();
    let normalizedTasks = normalizeTasks(rawTasks);
    const rewardSource = Array.isArray(childData.rewards)
      ? childData.rewards
      : (Array.isArray(childData.availableRewards) ? childData.availableRewards : rewards);

    if (rawTasks.length > 0 && normalizedTasks.length === 0) {
      normalizedTasks = getDefaultTasks();
    }

    return {
      tasks: normalizedTasks,
      points: normalizedPoints > 0 ? normalizedPoints : 0,
      claimedRewards: Array.isArray(childData.claimedRewards) ? childData.claimedRewards : [],
      rewards: normalizeRewards(rewardSource)
    };
  }

  function getDefaultRewards() {
    return [
      { id: "youtube30", title: "30 минут YouTube", cost: 30 },
      { id: "smallGift", title: "Маленький подарок", cost: 100 },
      { id: "familyCafe", title: "Семейная прогулка/кафе", cost: 200 }
    ];
  }

  function normalizeRewards(rewardList) {
    const normalizedRewards = Array.isArray(rewardList) ? rewardList
      .map(function(reward, index) {
        const title = String(reward && reward.title || "").trim();
        const cost = Number(reward && reward.cost);

        if (title === "" || cost <= 0) {
          return null;
        }

        return {
          id: String(reward.id || "reward" + index),
          title: title,
          cost: cost
        };
      })
      .filter(Boolean)
      .filter(function(reward, index, source) {
        return source.findIndex(function(otherReward) {
          return otherReward.id === reward.id;
        }) === index;
      }) : [];

    return Array.isArray(rewardList) ? normalizedRewards : getDefaultRewards();
  }

  function normalizeHistory(historyList) {
    if (!Array.isArray(historyList)) {
      return [];
    }

    return historyList
      .map(function(entry) {
        const child = String(entry && entry.child || "").trim();
        const task = String(entry && entry.task || "").trim();
        const points = Number(entry && entry.points);
        const date = String(entry && entry.date || "").trim();

        if (child === "" || task === "" || points <= 0 || date === "") {
          return null;
        }

        return {
          child: child,
          task: task,
          points: points,
          date: date
        };
      })
      .filter(Boolean);
  }

  function loadTaskHistory() {
    taskHistory = normalizeHistory(safeParseJSON(localStorage.getItem("taskHistory"), []));

    const childFilter = document.getElementById("historyChildFilter");

  function renderHistory() {
    const historyList = document.getElementById("historyList");

    if (!historyList || !childFilter || !dateFilter) {

    const defaultSettings = {
      time: "18:00",
      text: "Пора выполнить задачи",
      lastShownDate: ""
    };
    const savedSettings = settings && typeof settings === "object" ? settings : {};
    const time = /^\d{2}:\d{2}$/.test(savedSettings.time || "") ? savedSettings.time : defaultSettings.time;
    const text = String(savedSettings.text || "").trim() || defaultSettings.text;

    return {
      time: time,
      text: text,
      lastShownDate: String(savedSettings.lastShownDate || "")
    };
  }

    if (!timeInput || !textInput) {

    timeInput.value = reminderSettings.time;

    const textInput = document.getElementById("reminderTextInput");

        time: timeInput.value,

      });

  function requestNotificationPermission() {
    saveReminderSettings();

    if (!("Notification" in window)) {
      alert("Уведомления не поддерживаются в этом браузере");
      return;
    }

    Notification.requestPermission().then(function(permission) {
      if (permission !== "granted") {
        alert("Разрешение на уведомления не включено");
        scheduleTaskReminder();
        return;
      }

      checkTaskReminder();
      scheduleTaskReminder();
    });
  }

  function hasIncompleteTasks() {
    return tasks.some(function(task) {
      return !task.done;
    });
  }

  function getReminderDateForToday() {
    const parts = reminderSettings.time.split(":").map(Number);
    const reminderDate = new Date();
    reminderDate.setHours(parts[0], parts[1], 0, 0);

    return reminderDate;
  }

  function scheduleTaskReminder() {
    if (reminderTimer) {
      clearTimeout(reminderTimer);
    }

    const now = new Date();
    let reminderDate = getReminderDateForToday();

    if (reminderDate <= now) {
      reminderDate.setDate(reminderDate.getDate() + 1);
    }

    const delay = Math.max(1000, reminderDate - now);
    reminderTimer = setTimeout(function() {
      checkTaskReminder();
      scheduleTaskReminder();
    }, delay);
  }

  function checkTaskReminder() {
    if (reminderSettings.lastShownDate === getTodayString()) {
      return;
    }

    if (new Date() < getReminderDateForToday()) {
      return;
    }

    if (!hasIncompleteTasks()) {
      reminderSettings.lastShownDate = getTodayString();
      saveReminderSettings();
      return;
    }

    showTaskReminderNotification();
  }

  function showTaskReminderNotification() {
    if (!("Notification" in window) || Notification.permission !== "granted") {
      return;
    }

    const title = reminderSettings.text;
    const options = {
      body: currentChild + ": есть невыполненные задачи",
      tag: "family-tasks-daily-reminder",
      renotify: false
    };

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(function(registration) {
        if (registration.active) {
          registration.active.postMessage({
            type: "SHOW_REMINDER",
            title: title,
            options: options
          });
        } else {
          registration.showNotification(title, options);
        }
      });
    } else {
      new Notification(title, options);
    }

    reminderSettings.lastShownDate = getTodayString();
    localStorage.setItem("taskReminderSettings", JSON.stringify(reminderSettings));
  }

      "1 этаж — санузел": "1 ЭТАЖ — санузел",

      "2 этаж": "2 ЭТАЖ — спальни и утренний порядок",
      "2 этаж — спальни": "2 ЭТАЖ — спальни и утренний порядок",
      "2 этаж — спальни и утренний порядок": "2 ЭТАЖ — спальни и утренний порядок",
      "ванная 2 этаж": "2 ЭТАЖ — ванная",
      "2 этаж — ванная": "2 ЭТАЖ — ванная",
      "общие задачи": "ОБЩИЕ ЗАДАЧИ",
      "учёба и развитие": "УЧЁБА И РАЗВИТИЕ",
      "учеба и развитие": "УЧЁБА И РАЗВИТИЕ",
      "улица и двор": "УЛИЦА И ДВОР",
      "без категории": uncategorizedName
    };

    if (categoryAliases[lowerValue]) {
      return categoryAliases[lowerValue];
    }

    const matchedCategory = categoryOrder.find(function(knownCategory) {
      return knownCategory.toLowerCase() === lowerValue;
    });

    if (matchedCategory) {
      return matchedCategory;
    }

    return uncategorizedName;
  }

  function taskMatchesFilter(task) {
    const frequency = String(task.frequency || "").toLowerCase();

    if (activeTaskFilter === "today") {
      return !task.done;
    }

    if (activeTaskFilter === "daily") {
      return frequency === "ежедневно";
    }

    if (activeTaskFilter === "fewWeekly") {
      return frequency === "2–3 раза в неделю" || frequency === "2-3 раза в неделю";
    }

    if (activeTaskFilter === "weekly") {
      return frequency === "1 раз в неделю";
    }

    if (activeTaskFilter === "done") {
      return task.done;
    }

    if (activeTaskFilter === "todo") {
      return !task.done;
    }

    return true;
  }

  function applyTaskTemplateUpdates(taskList) {
    const updatedTasks = taskList.slice();

    taskTemplateUpdates.forEach(function(templateTask) {
      const namesToMatch = [templateTask.text].concat(templateTask.aliases || []);
      const matchIndex = updatedTasks.findIndex(function(task) {
        return namesToMatch.includes(task.text) || namesToMatch
          .map(normalizeTaskName)
          .includes(normalizeTaskName(task.text));
      });

      if (matchIndex === -1) {
        updatedTasks.push({
          text: templateTask.text,
          points: templateTask.points,
          frequency: templateTask.frequency,
          category: normalizeCategoryName(templateTask.category),
          icon: templateTask.icon || getTaskIcon(templateTask),
          done: false,
          lastCompletedAt: null,
          completedPoints: null
        });
      } else {
        updatedTasks[matchIndex] = {
          text: templateTask.text,
          points: templateTask.points,
          frequency: templateTask.frequency,
          category: normalizeCategoryName(templateTask.category),
          icon: updatedTasks[matchIndex].icon || templateTask.icon || getTaskIcon(templateTask),
          done: updatedTasks[matchIndex].done,
          lastCompletedAt: updatedTasks[matchIndex].lastCompletedAt || null,
          completedPoints: updatedTasks[matchIndex].completedPoints || null
        };
      }
    });

    return updatedTasks.filter(function(task, index) {
      const normalizedTaskName = normalizeTaskName(task.text);
      const isOldAlias = taskTemplateUpdates.some(function(templateTask) {
        return normalizeTaskName(templateTask.text) !== normalizedTaskName &&
          (templateTask.aliases || []).map(normalizeTaskName).includes(normalizedTaskName);
      });

      if (isOldAlias) {
        return false;
      }

      return updatedTasks.findIndex(function(otherTask) {
        return normalizeTaskName(otherTask.text) === normalizeTaskName(task.text);
      }) === index;
    });
  }

  function applyTaskTemplateUpdatesForAllChildren() {
    children.forEach(function(child) {
      const storageKey = getStorageKey(child);
      const savedData = localStorage.getItem(storageKey);

      if (!savedData) {
        const initialData = getInitialChildData();
        const resetInitialData = resetTasksByFrequency(applyTaskTemplateUpdates(initialData.tasks));
        initialData.tasks = resetInitialData.tasks;
        localStorage.setItem(storageKey, JSON.stringify(initialData));
        return;
      }

      const data = normalizeChildData(safeParseJSON(savedData, getInitialChildData()));
      const resetResult = resetTasksByFrequency(applyTaskTemplateUpdates(data.tasks));
      data.tasks = resetResult.tasks;
      localStorage.setItem(storageKey, JSON.stringify(data));
    });
  }

  function loadChildren() {
    const savedChildren = localStorage.getItem("children");
    const savedRewards = localStorage.getItem("rewards");
    const savedParentMode = localStorage.getItem("parentMode");
    const savedExpandedCategories = localStorage.getItem("expandedCategories");
    const savedTaskFilter = localStorage.getItem("activeTaskFilter");

    children = uniqueList(safeParseJSON(savedChildren, defaultChildren.slice()));

    if (children.length === 0) {
      children = defaultChildren.slice();
    }

    rewards = normalizeRewards(safeParseJSON(savedRewards, rewards));

    isParentMode = savedParentMode === "true";
    expandedCategories = uniqueList(uniqueList(safeParseJSON(savedExpandedCategories, [])).map(normalizeCategoryName));
    activeTaskFilter = taskFilters.some(function(filter) {
      return filter.id === savedTaskFilter;
    }) ? savedTaskFilter : "today";

    const savedChild = localStorage.getItem("currentChild");

    if (savedChild && !children.includes(savedChild)) {
      children.push(savedChild);
    }

    currentChild = savedChild || children[0];

    if (!children.includes(currentChild)) {
      currentChild = children[0];
    }

    loadTaskHistory();
    migrateChildNames();
    saveChildren();
    applyTaskTemplateUpdatesForAllChildren();
    loadReminderSettings();
    updateParentModeView();
    renderChildren();
    renderTaskFilters();
    renderRanking();
    renderHistory();
    renderTabs();
  }

  function saveChildren() {
    rewards = normalizeRewards(rewards);
    localStorage.setItem("children", JSON.stringify(children));
    localStorage.setItem("currentChild", currentChild);
    localStorage.setItem("rewards", JSON.stringify(rewards));
    localStorage.setItem("parentMode", isParentMode);
    scheduleCloudSave();
  }

  function migrateChildNames() {
    const oldName = "Олеся";
    const newName = "Алеся";

    if (!children.includes(oldName)) {
      return;
    }

    const oldKey = getStorageKey(oldName);
    const newKey = getStorageKey(newName);
    const oldData = localStorage.getItem(oldKey);
    const newData = localStorage.getItem(newKey);

    children = children.map(function(child) {
      return child === oldName ? newName : child;
    }).filter(function(child, index, list) {
      return list.indexOf(child) === index;
    });

    if (oldData && !newData) {
      localStorage.setItem(newKey, oldData);
    }

    localStorage.removeItem(oldKey);

    if (currentChild === oldName) {
      currentChild = newName;
    }
  }

  function renderChildren() {
    const select = document.getElementById("childSelect");
    select.innerHTML = "";

    children.forEach(function(child) {
      const option = document.createElement("option");
      option.value = child;
      option.innerText = child;
      select.appendChild(option);
    });

    select.value = currentChild;
    select.disabled = !isParentMode;
    document.getElementById("childView").style.display = editingChild ? "none" : "flex";
    document.getElementById("childEdit").style.display = editingChild ? "flex" : "none";
    renderHistoryFilters();
    renderRanking();
    updateKidSummary();
  }

  function loadData() {
    const savedData = localStorage.getItem(getStorageKey(currentChild));

    if (savedData) {
      const data = normalizeChildData(safeParseJSON(savedData, getInitialChildData()));
      tasks = data.tasks;
      points = data.points;
      claimedRewards = data.claimedRewards;
      rewards = data.rewards;
    } else {
      tasks = getDefaultTasks();
      points = 0;
      claimedRewards = [];
      rewards = getDefaultRewards();
    }

    tasks = applyTaskTemplateUpdates(tasks);
    const resetResult = resetTasksByFrequency(tasks);
    tasks = resetResult.tasks;
    saveData();
    renderTasks();
    renderRewards();
    renderHistory();
    renderProgressHistory();
    updatePoints();
    renderRanking();
    checkTaskReminder();
    scheduleTaskReminder();
  }

  function saveData() {
    const data = {
      tasks: tasks,
      points: Math.max(0, Number(points) || 0),
      claimedRewards: Array.isArray(claimedRewards) ? claimedRewards : [],
      rewards: normalizeRewards(rewards)
    };

    points = data.points;
    claimedRewards = data.claimedRewards;
    rewards = data.rewards;
    localStorage.setItem(getStorageKey(currentChild), JSON.stringify(data));
    saveChildren();
    renderRanking();
    scheduleCloudSave();
  }

  function updatePoints() {
    document.getElementById("points").innerText = "Баллы: " + points;
    updateKidSummary();
  }

  function getChildPoints(child) {
    if (child === currentChild) {
      return Math.max(0, Number(points) || 0);
    }

    const savedData = safeParseJSON(localStorage.getItem(getStorageKey(child)), null);
    const savedPoints = Number(savedData && savedData.points);

    return savedPoints > 0 ? savedPoints : 0;
  }

  function renderRanking() {
    const rankingList = document.getElementById("rankingList");

    if (!rankingList) {
      return;
    }

    rankingList.innerHTML = "";

    const ranking = children.map(function(child) {
      return {
        child: child,
        points: getChildPoints(child)
      };
    }).sort(function(first, second) {
      return second.points - first.points || first.child.localeCompare(second.child);
    });

    ranking.forEach(function(item, index) {
      const row = document.createElement("div");
      row.className = "ranking-item";

      if (index === 0 && ranking.length > 0) {
        row.classList.add("leader");
      }

      const name = document.createElement("span");
      name.className = "ranking-name";
      name.innerText = (index === 0 ? "👑 " : "") + item.child;

      const score = document.createElement("span");
      score.className = "ranking-points";
      score.innerText = item.points + " баллов";

      row.appendChild(name);
      row.appendChild(score);
      rankingList.appendChild(row);
    });
  }

    document.body.classList.toggle("parent-mode", isParentMode);
    document.getElementById("parentModeLabel").classList.toggle("active", isParentMode);
    document.getElementById("logoutParentButton").classList.toggle("active", isParentMode);
    renderReminderSettings();
    placeParentBlocks();

    if (!isParentMode && activeTab === "parent") {
      activeTab = "today";
    }

      editingIndex = null;
      editingChild = false;
      editingRewardId = null;

      document.getElementById("taskPointsInput").value = "10";

    if (pin === parentPin) {
      isParentMode = true;
      saveChildren();
      updateParentModeView();

    editingChild = false;

    renderChildren();
    document.getElementById("childNameInput").focus();

  function saveChildName() {
    if (!isParentMode) {
      return;
    }

    const input = document.getElementById("childNameInput");
    const oldName = currentChild;
    const newName = input.value.trim();

    if (newName === "") {
      return;
    }

    if (newName !== oldName && children.includes(newName)) {
      alert("Такой ребенок уже есть");
      return;
    }

    const oldKey = getStorageKey(oldName);
    const newKey = getStorageKey(newName);
    const currentData = localStorage.getItem(oldKey) || JSON.stringify({
      tasks: tasks,
      points: points,
      claimedRewards: claimedRewards
    });
    const childIndex = children.indexOf(oldName);

    if (childIndex !== -1) {
      children[childIndex] = newName;
    }

    currentChild = newName;
    localStorage.setItem(newKey, currentData);

    if (newKey !== oldKey) {
      localStorage.removeItem(oldKey);
    }

    editingChild = false;
    saveChildren();
    renderChildren();
    loadData();
  }

  function addChild() {
    if (!isParentMode) {
      return;
    }

    let name = prompt("Имя нового ребенка:");

    if (name === null) {
      return;
    }

    name = name.trim();

    if (name === "") {
      return;
    }

    if (children.includes(name)) {
      alert("Такой ребенок уже есть");
      return;
    }

    children.push(name);
    currentChild = name;
    tasks = getDefaultTasks();
    points = 0;
    claimedRewards = [];
    rewards = getDefaultRewards();
    editingIndex = null;
    editingChild = false;

    saveChildren();
    saveData();
    renderChildren();
    loadData();
  }

  function deleteChild() {
    if (!isParentMode) {
      return;
    }

    if (children.length === 1) {
      alert("Нельзя удалить последнего ребенка");
      return;
    }

    const confirmed = confirm("Удалить ребенка " + currentChild + " и все его задачи?");

    if (!confirmed) {
      return;
    }

    const deletedChild = currentChild;
    const deletedIndex = children.indexOf(deletedChild);
    children = children.filter(function(child) {
      return child !== deletedChild;
    });

    currentChild = children[deletedIndex] || children[deletedIndex - 1] || children[0];
    editingIndex = null;
    editingChild = false;

    localStorage.removeItem(getStorageKey(deletedChild));
    saveChildren();
    renderChildren();
    loadData();
  }

  function renderTasks() {
    const taskList = document.getElementById("taskList");

    if (!taskList) {
      return;
    }

    updateKidSummary();
    taskList.innerHTML = "";
    updateCategoryInputs();
    renderTaskFilters();
    let visibleTaskCount = 0;

    getCategories().forEach(function(category) {
      const categoryTasks = tasks
        .map(function(task, index) {
          return { task: task, index: index };
        })
        .filter(function(item) {
          const matchesCategory = normalizeCategoryName(item.task.category) === category;
          const matchesCurrentMode = isParentMode ? taskMatchesFilter(item.task) : !item.task.done;

          return matchesCategory && matchesCurrentMode;
        });

      if (categoryTasks.length === 0) {
        return;
      }

      visibleTaskCount += categoryTasks.length;
      const completedCount = categoryTasks.filter(function(item) {
        return item.task.done;
      }).length;
      const isExpanded = expandedCategories.includes(category);
      const categoryCard = document.createElement("div");
      categoryCard.className = "category-card";

      const header = document.createElement("button");
      header.className = "category-header";
      header.onclick = function() {
        toggleCategory(category);
      };

      const title = document.createElement("span");
      title.className = "category-title";
      title.innerText = category;

      const count = document.createElement("span");
      count.className = "category-count";
      count.innerText = completedCount + "/" + categoryTasks.length + " " + (isExpanded ? "▲" : "▼");

      header.appendChild(title);
      header.appendChild(count);
      categoryCard.appendChild(header);

      if (isExpanded) {
        const categoryBody = document.createElement("div");
        categoryBody.className = "category-tasks";

        categoryTasks.forEach(function(item) {
          categoryBody.appendChild(createTaskElement(item.task, item.index));
        });

        categoryCard.appendChild(categoryBody);
      }

      taskList.appendChild(categoryCard);
    });

    if (visibleTaskCount === 0) {
      const emptyMessage = document.createElement("div");
      emptyMessage.className = "task-empty";
      emptyMessage.innerText = "Нет задач по выбранному фильтру";
      taskList.appendChild(emptyMessage);
      editingIndex = null;
      return;
    }

    if (editingIndex !== null) {
      const editInput = document.getElementById("editInput" + editingIndex);

      if (editInput) {
        editInput.focus();
      }
    }
  }

      input.className = "task-edit-input";

        if (event.key === "Enter") {

        }

      pointsLabel.innerText = "баллы";

      const categorySelect = document.createElement("select");

      editBox.appendChild(iconInput);
      pointsField.appendChild(pointsInput);
      pointsField.appendChild(pointsLabel);

      editBox.appendChild(pointsField);
      editBox.appendChild(categorySelect);
      taskElement.appendChild(editBox);
    } else {
      const main = document.createElement("div");
      main.className = "task-main";

      const taskIcon = getTaskIcon(task);

      if (taskIcon) {
        const icon = document.createElement("span");
        icon.className = "task-icon";
        icon.innerText = taskIcon;
        main.appendChild(icon);
      }

      const content = document.createElement("div");
      content.className = "task-content";

      toggleDone(index);
    };

    actions.appendChild(doneButton);

    if (isParentMode) {
      const editButton = document.createElement("button");
      editButton.className = "secondary-button";

      if (editingIndex === index) {
        editButton.innerText = "✓";
        editButton.title = "Сохранить";
        editButton.onclick = function() {
          saveEdit(index);
        };
      } else {
        editButton.innerText = "✏️";
        editButton.title = "Редактировать";
        editButton.onclick = function() {
          editTask(index);
        };
      }

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.innerText = "🗑️";
      deleteButton.title = "Удалить";
      deleteButton.onclick = function() {
        deleteTask(index);
      };

      actions.appendChild(editButton);
      actions.appendChild(deleteButton);
    }

    taskElement.appendChild(actions);
    return taskElement;
  }

  function renderRewards() {
    const rewardList = document.getElementById("rewardList");
    const parentRewardList = document.getElementById("parentRewardList");

    rewardList.innerHTML = "";
    if (parentRewardList) {
      parentRewardList.innerHTML = "";
    }

    rewards.forEach(function(reward) {
      const isClaimed = claimedRewards.includes(reward.id);
      const canClaim = points >= reward.cost && !isClaimed;
      const rewardElement = document.createElement("div");
      rewardElement.className = "reward";

      if (isClaimed) {
        rewardElement.classList.add("reward-claimed");
      }

      if (justClaimedRewardId === reward.id) {
        rewardElement.classList.add("reward-just-claimed");
      }

      if (editingRewardId === reward.id) {
        const editBox = document.createElement("div");
        editBox.className = "reward-edit";

        const titleInput = document.createElement("input");
        titleInput.id = "rewardTitle" + reward.id;
        titleInput.value = reward.title;

        const costInput = document.createElement("input");
        costInput.id = "rewardCost" + reward.id;
        costInput.className = "reward-cost-input";
        costInput.type = "number";
        costInput.min = "1";
        costInput.value = reward.cost;

        const saveButton = document.createElement("button");
        saveButton.className = "reward-button";
        saveButton.innerText = "Сохранить";
        saveButton.onclick = function() {
          saveReward(reward.id);
        };

        editBox.appendChild(titleInput);
        editBox.appendChild(costInput);
        editBox.appendChild(saveButton);
        rewardElement.appendChild(editBox);
      } else {
        const info = document.createElement("div");
        info.className = "reward-info";

        const title = document.createElement("p");
        title.className = "reward-name";
        title.innerText = reward.title;

        const cost = document.createElement("p");
        cost.className = "reward-cost";
        cost.innerText = reward.cost + " баллов";

        const progress = document.createElement("div");
        progress.className = "reward-progress";

        const progressFill = document.createElement("div");
        progressFill.className = "reward-progress-fill";
        progressFill.style.width = Math.min(100, Math.round((points / reward.cost) * 100)) + "%";

        const left = document.createElement("span");
        left.className = "reward-left";
        left.innerText = points >= reward.cost
          ? points + " / " + reward.cost + " баллов"
          : points + " / " + reward.cost + " · осталось " + (reward.cost - points);

        progress.appendChild(progressFill);

        const actions = document.createElement("div");
        actions.className = "reward-actions";

        const button = document.createElement("button");
        button.className = "reward-button";
        button.innerText = isClaimed ? "Получено" : (canClaim ? "Получить" : "Не хватает");
        button.disabled = isClaimed || !canClaim;

        if (!canClaim && !isClaimed) {
          button.classList.add("locked");
        }

        button.onclick = function() {
          claimReward(reward.id);
        };

        info.appendChild(title);
        info.appendChild(cost);
        info.appendChild(progress);
        info.appendChild(left);
        rewardElement.appendChild(info);
        actions.appendChild(button);

        if (justClaimedRewardId === reward.id) {
          const status = document.createElement("span");
          status.className = "reward-status";
          status.innerText = "получено";
          actions.appendChild(status);
        }

        if (isParentMode) {
          const editButton = document.createElement("button");
          editButton.className = "secondary-button";
          editButton.innerText = "✏️";
          editButton.title = "Редактировать награду";
          editButton.onclick = function() {
            editReward(reward.id);
          };

          actions.appendChild(editButton);

          const deleteButton = document.createElement("button");
          deleteButton.className = "delete-button";
          deleteButton.innerText = "🗑️";
          deleteButton.title = "Удалить награду";
          deleteButton.onclick = function() {
            deleteReward(reward.id);
          };

          actions.appendChild(deleteButton);
        }

        rewardElement.appendChild(actions);
      }

      const targetList = activeTab === "parent" && parentRewardList ? parentRewardList : rewardList;
      targetList.appendChild(rewardElement);
    });

    if (editingRewardId !== null) {
      const rewardInput = document.getElementById("rewardTitle" + editingRewardId);

      if (rewardInput) {
        rewardInput.focus();
      }
    }
  }

  function addTask() {
    if (!isParentMode) {
      return;
    }

    const input = document.getElementById("taskInput");
    const pointsInput = document.getElementById("taskPointsInput");
    const categoryInput = document.getElementById("taskCategoryInput");
    const text = input.value.trim();
    const taskPoints = Number(pointsInput.value);
    const taskCategory = normalizeCategoryName(categoryInput.value);

    if (text === "" || taskPoints <= 0) {
      return;
    }

    const newTask = {
      text: text,
      points: taskPoints,
      frequency: "",
      category: taskCategory,
      done: false,
      lastCompletedAt: null,
      completedPoints: null
    };
    newTask.icon = getTaskIcon(newTask);
    tasks.push(newTask);
    input.value = "";
    pointsInput.value = "10";
    categoryInput.value = uncategorizedName;

    saveData();
    renderTasks();
  }

  function loadCleaningTemplate() {
    if (!isParentMode) {
      return;
    }

    const result = mergeCleaningTemplate(tasks);
    tasks = result.tasks;

    saveData();
    renderTasks();
    updateCategoryInputs();

    showTemplateMessage(result);
  }

  function loadCleaningTemplateForAllChildren() {
    if (!isParentMode) {
      return;
    }

    let addedCount = 0;
    let updatedCount = 0;
    let skippedCount = 0;

    children.forEach(function(child) {
      const storageKey = getStorageKey(child);
      const savedData = localStorage.getItem(storageKey);
      const data = normalizeChildData(safeParseJSON(savedData, getInitialChildData()));
      const result = mergeCleaningTemplate(data.tasks);

      data.tasks = result.tasks;
      localStorage.setItem(storageKey, JSON.stringify(data));

      addedCount += result.addedCount;
      updatedCount += result.updatedCount;
      skippedCount += result.skippedCount;

      if (child === currentChild) {
        tasks = result.tasks;
        points = data.points || 0;
        claimedRewards = data.claimedRewards || [];
        rewards = data.rewards || getDefaultRewards();
      }
    });

    saveChildren();
    renderTasks();
    renderRewards();
    renderRanking();
    updatePoints();

    showTemplateMessage({ addedCount: addedCount, updatedCount: updatedCount, skippedCount: skippedCount });
  }

  function mergeCleaningTemplate(taskList) {
    const mergedTasks = taskList.slice();
    let addedCount = 0;
    let updatedCount = 0;
    let skippedCount = 0;

    cleaningTemplateTasks.forEach(function(templateTask) {
      const taskIndex = mergedTasks.findIndex(function(task) {
        return normalizeTaskName(task.text) === normalizeTaskName(templateTask.title);
      });

      if (taskIndex === -1) {
        mergedTasks.push({
          text: templateTask.title,
          points: templateTask.points,
          frequency: templateTask.frequency,
          category: normalizeCategoryName(templateTask.category),
          icon: templateTask.icon || getTaskIcon(templateTask),
          done: Boolean(templateTask.completed),
          lastCompletedAt: null,
          completedPoints: null
        });
        addedCount += 1;
        return;
      }

      const currentTask = mergedTasks[taskIndex];
      const hasChanges = currentTask.text !== templateTask.title ||
        currentTask.points !== templateTask.points ||
        currentTask.frequency !== templateTask.frequency ||
        currentTask.category !== normalizeCategoryName(templateTask.category);

      if (hasChanges) {
        mergedTasks[taskIndex] = {
          text: templateTask.title,
          points: templateTask.points,
          frequency: templateTask.frequency,
          category: normalizeCategoryName(templateTask.category),
          icon: currentTask.icon || templateTask.icon || getTaskIcon(templateTask),
          done: currentTask.done,
          lastCompletedAt: currentTask.lastCompletedAt || null,
          completedPoints: currentTask.completedPoints || null
        };
        updatedCount += 1;
      } else {
        skippedCount += 1;
      }
    });

    return {
      tasks: mergedTasks,
      addedCount: addedCount,
      updatedCount: updatedCount,
      skippedCount: skippedCount
    };
  }

  function showTemplateMessage(result) {
    if (result.updatedCount > 0) {
      alert("Шаблон обновлён");
    } else if (result.addedCount > 0 && result.skippedCount > 0) {
      alert("Новые задачи добавлены, дубликаты пропущены");
    } else {
      alert("Шаблон уборки загружен");
    }
  }

  function toggleDone(index) {
    if (!tasks[index]) {
      return;
    }

    const taskPoints = tasks[index].points;

    if (tasks[index].done) {
      const pointsToRemove = Number(tasks[index].completedPoints || taskPoints);
      tasks[index].done = false;
      tasks[index].lastCompletedAt = null;
      tasks[index].completedPoints = null;
      points = Math.max(0, points - pointsToRemove);
    } else {
      tasks[index].done = true;
      tasks[index].lastCompletedAt = getTodayString();
      tasks[index].completedPoints = taskPoints;
      points += taskPoints;
      addTaskHistory(tasks[index], taskPoints);
    }

    saveData();
    renderTasks();
    renderRewards();
    renderHistory();
    renderProgressHistory();
    updatePoints();
    scheduleTaskReminder();
  }

  function claimReward(rewardId) {
    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward || claimedRewards.includes(rewardId) || points < reward.cost) {
      return;
    }

    points -= reward.cost;
    claimedRewards.push(rewardId);
    justClaimedRewardId = rewardId;

    saveData();
    renderRewards();
    renderRanking();
    updatePoints();

    setTimeout(function() {
      if (justClaimedRewardId === rewardId) {
        justClaimedRewardId = null;
        renderRewards();
      }
    }, 1200);
  }

  function editReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    editingRewardId = rewardId;
    renderRewards();
  }

  function addReward() {
    if (!isParentMode) {
      return;
    }

    const nameInput = document.getElementById("rewardNameInput");
    const costInput = document.getElementById("rewardCostInput");
    const title = nameInput.value.trim();
    const cost = Number(costInput.value);

    if (title === "" || cost <= 0) {
      return;
    }

    rewards.push({
      id: "reward_" + Date.now(),
      title: title,
      cost: cost
    });

    nameInput.value = "";
    costInput.value = "30";

    saveData();
    renderRewards();
  }

  function saveReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    const titleInput = document.getElementById("rewardTitle" + rewardId);
    const costInput = document.getElementById("rewardCost" + rewardId);
    const title = titleInput.value.trim();
    const cost = Number(costInput.value);

    if (title === "" || cost <= 0) {
      return;
    }

    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward) {
      return;
    }

    reward.title = title;
    reward.cost = cost;
    editingRewardId = null;

    saveData();
    renderRewards();
  }

  function deleteReward(rewardId) {
    if (!isParentMode) {
      return;
    }

    const reward = rewards.find(function(item) {
      return item.id === rewardId;
    });

    if (!reward) {
      return;
    }

    if (!confirm("Удалить награду \"" + reward.title + "\"?")) {
      return;
    }

    rewards = rewards.filter(function(item) {
      return item.id !== rewardId;
    });
    claimedRewards = claimedRewards.filter(function(id) {
      return id !== rewardId;
    });

    if (editingRewardId === rewardId) {
      editingRewardId = null;
    }

    saveData();
    renderRewards();
  }

  function editTask(index) {
    if (!isParentMode) {
      return;
    }

    editingIndex = index;
    renderTasks();
  }

  function saveEdit(index) {
    if (!isParentMode) {
      return;
    }

    const input = document.getElementById("editInput" + index);
    const pointsInput = document.getElementById("editPointsInput" + index);
    const categoryInput = document.getElementById("editCategoryInput" + index);
    const iconInput = document.getElementById("editIconInput" + index);

    if (!tasks[index] || !input || !pointsInput || !categoryInput || !iconInput) {
      editingIndex = null;
      renderTasks();
      return;
    }

    const text = input.value.trim();
    const taskPoints = Number(pointsInput.value);
    const taskCategory = normalizeCategoryName(categoryInput.value);
    const taskIcon = iconInput.value.trim();

    if (text === "" || taskPoints <= 0) {
      return;
    }

    tasks[index].text = text;
    tasks[index].points = taskPoints;
    tasks[index].category = taskCategory;
    tasks[index].icon = taskIcon || getTaskIcon({ text: text });
    editingIndex = null;

    saveData();
    renderTasks();
  }

  function deleteTask(index) {
    if (!isParentMode) {
      return;
    }

    if (!tasks[index]) {
      return;
    }

    if (tasks[index].done) {
      points = Math.max(0, points - Number(tasks[index].completedPoints || tasks[index].points));
    }

    tasks.splice(index, 1);

    if (editingIndex === index) {
      editingIndex = null;
    } else if (editingIndex > index) {
      editingIndex -= 1;
    }

    saveData();
    renderTasks();
  }

  async function startApp() {
    setSyncStatus("Работает локально", "local");
    await initializeCloudSync();
    loadChildren();
    loadData();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  }

  startApp();
</script>

</body>
