<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Family Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#70c99b">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 223, 118, 0.36) 0 64px, transparent 65px),
        radial-gradient(circle at 88% 14%, rgba(164, 213, 255, 0.36) 0 58px, transparent 59px),
        radial-gradient(circle at 16% 88%, rgba(255, 184, 207, 0.28) 0 72px, transparent 73px),
        linear-gradient(180deg, #f8fcff 0%, #edf8f1 100%);
      margin: 0;
      min-height: 100vh;
      padding: 18px 18px 86px;
      color: #263238;
    }

    h1 {
      text-align: center;
      margin: 8px 0 18px;
      font-size: 28px;
      color: #263238;
      letter-spacing: 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mode-label {
      display: none;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e7f6ee;
      color: #245444;
      font-size: 13px;
      font-weight: bold;
    }

    .mode-label.active {
      display: inline-flex;
    }

    .parent-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: 10px 0;
    }

    .logout-button {
      display: none;
      padding: 9px 12px;
      border-radius: 14px;
      font-size: 13px;
    }

    .logout-button.active {
      display: inline-flex;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      padding: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(65, 92, 86, 0.14);
      backdrop-filter: blur(12px);
    }

    .child-select,
    .add-task {
      display: flex;
      gap: 10px;
      margin: 16px 0;
      align-items: center;
    }

    .add-task {
      gap: 8px;
      margin: 10px 0;
      flex-wrap: nowrap;
    }

    .add-task input,
    .add-task select {
      padding: 7px 9px;
      border-radius: 12px;
      font-size: 14px;
    }

    #taskInput {
      flex: 1 1 auto;
    }

    #taskPointsInput {
      flex: 0 0 66px;
      width: 66px;
      max-width: 66px;
      padding-left: 4px;
      padding-right: 4px;
      text-align: center;
    }

    #taskCategoryInput {
      flex: 0 0 120px;
      width: 120px;
    }

    .add-task-button {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .add-task-form,
    .task-form,
    .parent-task-form,
    .task-input-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 100%;
      gap: 10px;
      align-items: stretch;
    }

    .task-form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .task-form-field label {
      color: #526760;
      font-size: 12px;
      font-weight: 700;
      padding-left: 2px;
    }

    .task-form-field input,
    .task-form-field select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    .add-task-form input,
    .add-task-form select,
    .task-form input,
    .task-form select,
    .parent-task-form input,
    .parent-task-form select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    .task-form-title {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
    }

    .task-form-small {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
    }

    .task-form-category {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
    }

    .parent-task-form #taskInput,
    .parent-task-form #taskInputDe,
    .parent-task-form #taskPointsInput,
    .parent-task-form #taskCategoryInput,
    .parent-task-form #taskIconInput {
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .add-task-form button,
    .task-form button,
    .parent-task-form button {
      width: 100%;
      min-height: 44px;
      white-space: normal;
      line-height: 1.2;
    }

    .parent-task-form .add-task-button {
      width: 100%;
      height: auto;
      min-height: 44px;
      padding: 11px 14px;
      border-radius: 14px;
    }

    .child-select {
      align-items: stretch;
      flex-direction: column;
    }

    .child-row,
    .child-edit {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .task-points-field {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6c8078;
      font-size: 13px;
      white-space: nowrap;
    }

    .task-points-input {
      max-width: 82px;
      text-align: center;
    }

    .task-category-select {
      min-width: 0;
    }

    input,
    select {
      flex: 1;
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid #d8e4de;
      border-radius: 16px;
      font-size: 16px;
      background: #fbfffd;
      color: #263238;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    input:focus,
    select:focus {
      border-color: #78b99c;
      box-shadow: 0 0 0 4px rgba(120, 185, 156, 0.16);
    }

    label {
      font-weight: bold;
      color: #526760;
    }

    #points {
      display: none;
    }

    .task {
      position: relative;
      background: linear-gradient(180deg, #ffffff 0%, #fbfffd 100%);
      padding: 10px;
      margin: 7px 0;
      border-radius: 17px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      box-shadow: 0 5px 14px rgba(64, 84, 78, 0.07);
      border: 1px solid rgba(223, 237, 230, 0.92);
      transition: background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease, transform 0.18s ease;
    }

    .category-card {
      background: rgba(255, 255, 255, 0.94);
      margin: 9px 0;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(64, 84, 78, 0.08);
      border: 1px solid #edf3f0;
      overflow: hidden;
    }

    .category-header {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: linear-gradient(90deg, #f6fbf8 0%, #fffaf0 100%);
      color: #2f4d43;
      box-shadow: none;
      text-align: left;
    }

    .category-header:hover {
      background: #eaf4ee;
      box-shadow: none;
    }

    .category-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .category-count {
      color: #6c8078;
      font-size: 13px;
      white-space: nowrap;
    }

    .category-tasks {
      padding: 4px 8px 8px;
    }

    .category-tasks .task {
      margin: 6px 0;
      padding: 8px 9px;
      box-shadow: 0 3px 10px rgba(64, 84, 78, 0.05);
      background: #fbfffd;
    }

    .task-empty {
      padding: 14px 12px;
      margin: 10px 0;
      border-radius: 16px;
      background: #f6fbf8;
      border: 1px solid #edf3f0;
      color: #6c8078;
      text-align: center;
      font-size: 14px;
    }

    .task-filters {
      display: flex;
      gap: 6px;
      margin: 10px 0 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .task-filters::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f2f7f4;
      color: #557166;
      border: 1px solid #d8e8df;
      box-shadow: none;
      font-size: 13px;
    }

    .filter-button.active {
      background: #70c99b;
      color: #ffffff;
      border-color: #70c99b;
    }

    .filter-button:hover {
      box-shadow: none;
    }

    .parent-filter-block .section-title {
      margin-top: 8px;
    }

    .parent-section {
      margin: 8px 0;
      overflow: hidden;
      border: 1px solid #edf3f0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(64, 84, 78, 0.06);
    }

    #parentPanel .parent-section {
      width: 100%;
      flex-direction: column;
    }

    .parent-section-header {
      width: 100%;
      padding: 12px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f6fbf8;
      color: #2f4d43;
      box-shadow: none;
      text-align: left;
    }

    .parent-section-header:hover {
      box-shadow: none;
    }

    .parent-section-body {
      display: none;
      padding: 10px;
    }

    .parent-section.expanded .parent-section-body {
      display: block;
    }

    .inline-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .parent-section .child-select,
    .parent-section .add-task,
    .parent-section .add-reward,
    .parent-section .sync-row {
      margin: 0;
    }

    .parent-section .template-button,
    .parent-section .sync-button,
    .parent-section .add-reward button {
      min-height: 38px;
    }

    .parent-section .template-button + .template-button {
      margin-top: 8px;
    }

    .parent-reward-list {
      margin-top: 8px;
    }

    .category-manager {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .category-create-form {
      display: none;
      gap: 8px;
      align-items: center;
    }

    .category-create-form.active {
      display: flex;
    }

    .custom-category-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .custom-category-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 12px;
      background: #f7faf8;
      border: 1px solid #edf3f0;
      font-size: 13px;
    }

    .custom-category-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #2f4d43;
      font-weight: bold;
    }

    .category-management-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .category-management-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 12px;
      background: #f7faf8;
      border: 1px solid #edf3f0;
      font-size: 13px;
    }

    .category-management-info {
      flex: 1;
      min-width: 0;
    }

    .category-management-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #2f4d43;
      font-weight: bold;
    }

    .category-task-count {
      display: block;
      margin-top: 2px;
      color: #8a9c95;
      font-size: 12px;
    }

    .category-edit-input {
      flex: 1;
      min-width: 0;
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .category-header {
      border: none;
    }

    .category-toggle-button {
      flex: 1;
      min-width: 0;
      padding: 0;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: transparent;
      color: inherit;
      box-shadow: none;
      text-align: left;
    }

    .category-toggle-button:hover,
    .category-toggle-button:active {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .category-actions {
      display: none;
      flex: 0 0 auto;
      gap: 5px;
      align-items: center;
    }

    .parent-mode .category-card.custom-category .category-actions {
      display: flex;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 18px;
      color: #2f4d43;
    }

    .reward {
      background: linear-gradient(180deg, #ffffff 0%, #fffdf5 100%);
      padding: 13px;
      margin: 8px 0;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(64, 84, 78, 0.08);
      border: 1px solid #f2ead2;
    }

    .reward-info {
      flex: 1;
      min-width: 0;
    }

    .reward-name {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: bold;
      color: #263238;
    }

    .reward-cost {
      margin: 0;
      font-size: 13px;
      color: #6c8078;
    }

    .reward-claimed {
      opacity: 0.62;
    }

    .reward-just-claimed {
      animation: rewardPop 0.65s ease;
      border-color: #70c99b;
      background: #f0fff7;
    }

    @keyframes rewardPop {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(1.025);
        box-shadow: 0 12px 24px rgba(69, 173, 122, 0.2);
      }

      100% {
        transform: scale(1);
      }
    }

    .reward-firework-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      overflow: hidden;
      pointer-events: none;
    }

    .reward-firework-particle {
      position: absolute;
      left: 50%;
      top: 48%;
      font-size: 20px;
      line-height: 1;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
      animation: rewardFireworkParticle 0.95s ease-out forwards;
      animation-delay: var(--delay, 0ms);
      will-change: transform, opacity;
    }

    .task-points-pop {
      position: absolute;
      z-index: 4;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff5c7;
      color: #245444;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(177, 143, 37, 0.2);
      pointer-events: none;
      animation: taskPointsPop 0.85s ease-out forwards;
      will-change: transform, opacity;
    }

    .task-star-particle {
      position: absolute;
      z-index: 3;
      color: #ffd24f;
      font-size: 15px;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      animation: taskStarParticle 0.9s ease-out forwards;
      animation-delay: var(--delay, 0ms);
      will-change: transform, opacity;
    }

    @keyframes taskPointsPop {
      0% {
        opacity: 0;
        transform: translate(-50%, 10px) scale(0.88);
      }

      22% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1.05);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -28px) scale(1);
      }
    }

    @keyframes taskStarParticle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6) rotate(0deg);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(var(--scale, 1))
          rotate(var(--rotate, 0deg));
      }
    }

    @keyframes rewardFireworkParticle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6) rotate(0deg);
      }

      18% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(var(--scale, 1))
          rotate(var(--rotate, 0deg));
      }
    }

    .reward-button {
      padding: 9px 12px;
      border-radius: 14px;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(69, 173, 122, 0.2);
    }

    .reward-button.locked {
      background: #d4ded9;
      color: #6c8078;
      cursor: default;
      box-shadow: none;
    }

    .reward-status {
      color: #45ad7a;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .reward-requests-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reward-request-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 14px;
      background: #fbfffd;
      border: 1px solid #edf3f0;
      font-size: 13px;
    }

    .reward-request-title {
      font-weight: bold;
      color: #2f4d43;
    }

    .reward-request-meta {
      color: #6c8078;
      font-size: 12px;
    }

    .reward-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .reward-edit {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .reward-cost-input {
      max-width: 92px;
    }

    .add-reward {
      display: flex;
      gap: 8px;
      margin: 8px 0 10px;
      align-items: center;
    }

    .add-reward input {
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .add-reward .reward-cost-input {
      flex: 0 0 86px;
      max-width: 86px;
      text-align: center;
    }

    .add-reward button {
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0 12px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 14px;
      border: 1px solid #edf3f0;
      background: #fbfffd;
      color: #263238;
      font-size: 14px;
    }

    .ranking-item.leader {
      background: #fff9df;
      border-color: #f1d985;
      box-shadow: 0 8px 18px rgba(241, 217, 133, 0.18);
    }

    .ranking-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: bold;
    }

    .ranking-points {
      flex: 0 0 auto;
      color: #245444;
      font-weight: bold;
      white-space: nowrap;
    }

    .history-panel {
      margin-top: 8px;
    }

    .history-filters {
      display: flex;
      gap: 8px;
      margin: 8px 0 10px;
      align-items: center;
    }

    .history-filters select,
    .history-filters input {
      padding: 8px 9px;
      border-radius: 12px;
      font-size: 13px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid #edf3f0;
      border-radius: 14px;
      background: #fbfffd;
      color: #263238;
      font-size: 13px;
    }

    .history-info {
      min-width: 0;
    }

    .history-task {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: bold;
    }

    .history-meta,
    .history-empty {
      color: #8a9c95;
      font-size: 12px;
    }

    .history-points {
      flex: 0 0 auto;
      color: #245444;
      font-weight: bold;
      white-space: nowrap;
    }

    .task span,
    .task-edit-input,
    .task-content {
      flex: 1;
      line-height: 1.18;
      font-size: 14px;
      min-width: 0;
    }

    .task-title {
      color: #263238;
      font-weight: bold;
      display: -webkit-box;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: normal;
    }

    .translation-warning {
      color: #d17b35;
      font-size: 11px;
      line-height: 1.2;
    }

    .task-main {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .task-icon {
      flex: 0 0 auto;
      max-width: 24px;
      margin-top: 0;
      line-height: 1;
      text-align: center;
      font-size: 16px;
    }

    .task-points {
      color: #6c8078;
      font-size: 13px;
    }

    .task-meta {
      display: block;
      margin-top: 3px;
      color: #3f9f70;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-completed-at {
      display: block;
      margin-top: 2px;
      color: #6fb28c;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task.task-done {
      background: #f3faf6;
      border-color: #e4f1ea;
    }

    .task.task-just-done {
      animation: taskDonePop 0.5s ease;
      border-color: #a7dfc2;
    }

    .task-earned-pop {
      position: absolute;
      right: 56px;
      top: 10px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;

<main class="app">

          <div id="taskFilters" class="task-filters"></div>

            <input id="taskInput" type="text" placeholder="Название RU">
          </div>
          <div class="task-form-field task-form-title">
            <label for="taskInputDe">Название DE</label>
            <input id="taskInputDe" type="text" placeholder="Название DE">
          </div>
          <div class="task-form-field task-form-small">
            <label for="taskPointsInput">Баллы</label>
            <input id="taskPointsInput" class="task-points-input" type="number" min="1" value="10" title="Баллы">
          </div>
          <div class="task-form-field task-form-category">
            <label for="taskCategoryInput">Категория</label>
            <select id="taskCategoryInput" class="task-category-select"></select>
          </div>
          <div class="task-form-field task-form-small">
            <label for="taskIconInput">Иконка</label>
            <input id="taskIconInput" class="task-icon-input" type="text" maxlength="4" title="Иконка">

          <button class="add-task-button" onclick="addTask()" title="Добавить задачу">Добавить задачу</button>
        </div>
      </div>
    </div>

  function normalizeTasks(taskList) {
    return taskList.map(function(task) {
      const taskTitleRu = String(task.titleRu || task.text || task.title || "").trim();
      const taskTitleDe = String(task.titleDe || getStandardTaskTranslation(taskTitleRu) || "").trim();
      const taskPoints = Number(task.points || task.reward || 10);

      return {

        done: isDone,
        lastCompletedAt: task.lastCompletedAt || (isDone ? getTodayString() : null),
        completedPoints: isDone ? Number(task.completedPoints || taskPoints) : null,
        updatedAt: task.updatedAt || ""
      };
    }).filter(function(task) {
      return task.titleRu.trim() !== "";
    });
  }

  function getTodayString() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");

    return year + "-" + month + "-" + day;
  }

  function scheduleMidnightReset() {
    if (midnightResetTimer) {
      clearTimeout(midnightResetTimer);
    }

    const now = new Date();
    const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 1);
    const delay = Math.max(1000, nextMidnight - now);

    midnightResetTimer = setTimeout(function() {
      if (shouldRunDailyReset()) {
        resetAllTasksForNewDay(true);
      }

      scheduleMidnightReset();
    }, delay);
  }

  function parseDateString(dateString) {
    if (!dateString) {
      return null;
    }

    const parts = String(dateString).split("-").map(Number);

    if (parts.length !== 3 || parts.some(function(part) { return !part; })) {
      return null;
    }

    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function getDaysSince(dateString) {
    const completedDate = parseDateString(dateString);

    if (!completedDate) {
      return 0;
    }

    const today = parseDateString(getTodayString());
    const dayMs = 24 * 60 * 60 * 1000;

    return Math.floor((today - completedDate) / dayMs);
  }

  function shouldResetTask(task) {
    if (!task.done || !task.lastCompletedAt) {
      return false;
    }

    const frequency = String(task.frequency || "").toLowerCase();
    const daysSinceCompleted = getDaysSince(task.lastCompletedAt);

    if (frequency === "ежедневно") {
      return daysSinceCompleted >= 1;
    }

    if (frequency === "2–3 раза в неделю" || frequency === "2-3 раза в неделю") {
      return daysSinceCompleted >= 2;
    }

    if (frequency === "1 раз в неделю") {
      return daysSinceCompleted >= 7;
    }

    return false;
  }

  function resetTasksByFrequency(taskList) {
    let hasChanges = false;

    const resetTasks = taskList.map(function(task) {
      if (!shouldResetTask(task)) {
        return task;
      }

      hasChanges = true;

      return Object.assign({}, task, { done: false, completedPoints: null });
    });

    return {
      tasks: resetTasks,
      hasChanges: hasChanges
    };
  }

  function getCompletedAtLabel(task) {
    if (!task.done || !task.lastCompletedAt) {
      return "";
    }

    if (task.lastCompletedAt === getTodayString()) {
      return t("completedToday");
    }

    const completedDate = parseDateString(task.lastCompletedAt);

    if (!completedDate) {
      return "";
    }

    return t("completedAt") + " " + completedDate.toLocaleDateString(getCurrentChildLanguage() === "de" ? "de-DE" : "ru-RU");
  }

  function normalizeTaskName(name) {
    return String(name || "").trim().toLowerCase();
  }

  function normalizeTaskTitle(title) {
    return String(title || "")
      .trim()
      .toLowerCase()
      .replace(/ё/g, "е")
      .replace(/[–—-]/g, " ")
      .replace(/[.,;!?]+$/g, "")
      .replace(/[^0-9a-zа-яеäöüßéèêàç:()]+/gi, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function getStandardTaskTranslation(title) {
    const normalizedTitle = normalizeTaskTitle(title);

    if (standardTaskTranslations[normalizedTitle]) {
      return standardTaskTranslations[normalizedTitle];
    }

    const matchedKey = Object.keys(standardTaskTranslations).find(function(key) {
      return normalizeTaskTitle(key) === normalizedTitle;
    });

    return matchedKey ? standardTaskTranslations[matchedKey] : "";
  }

  function getTaskTitle(task) {
    const lang = getCurrentChildLanguage();

    if (lang === "de") {
      return task.titleDe || task.titleRu || task.title || task.text || "";
    }

    return task.titleRu || task.title || task.text || "";
  }

  function getNowIso() {
    return new Date().toISOString();
  }

  function getItemUpdatedAt(item) {
    const value = item && item.updatedAt ? Date.parse(item.updatedAt) : 0;
    return Number.isFinite(value) ? value : 0;
  }

  function chooseNewerItem(localItem, cloudItem) {
    if (!localItem) {
      return cloudItem;
    }

    if (!cloudItem) {
      return localItem;
    }

    const localUpdatedAt = getItemUpdatedAt(localItem);
    const cloudUpdatedAt = getItemUpdatedAt(cloudItem);

    if (localUpdatedAt && cloudUpdatedAt && cloudUpdatedAt > localUpdatedAt) {
      return cloudItem;
    }

    return localItem;
  }

  function safeParseJSON(value, fallback) {
    if (!value) {
      return fallback;
    }

    try {
      const parsedValue = JSON.parse(value);
      return parsedValue === null ? fallback : parsedValue;
    } catch (error) {
      return fallback;
    }
  }

  function uniqueList(list) {
    if (!Array.isArray(list)) {
      return [];
    }

    return list
      .map(function(item) {
        return String(item || "").trim();
      })
      .filter(function(item, index, source) {
        return item !== "" && source.indexOf(item) === index;
      });
  }

  function uniqueCategories(list) {
    const result = [];

    if (!Array.isArray(list)) {
      return result;
    }

    list.forEach(function(category) {
      const trimmedCategory = getCustomCategoryRu(category);
      const categoryDe = getCustomCategoryDe(category);
      const exists = result.some(function(existingCategory) {
        return getCustomCategoryRu(existingCategory).toLowerCase() === trimmedCategory.toLowerCase();
      });

      if (!exists && trimmedCategory !== "") {
        result.push({
          id: category && typeof category === "object" && category.id ? category.id : "cat_custom_" + Date.now() + "_" + result.length,
          nameRu: trimmedCategory,
          nameDe: categoryDe,
          isDefault: false,
          order: category && typeof category === "object" && Number.isFinite(Number(category.order)) ? Number(category.order) : 100 + result.length,
          updatedAt: category && typeof category === "object" && category.updatedAt ? category.updatedAt : ""
        });
      }
    });

    return result;
  }

  function uniqueCategoryNames(list) {
    const result = [];

    uniqueList(list).forEach(function(category) {
      const exists = result.some(function(existingCategory) {
        return existingCategory.toLowerCase() === category.toLowerCase();
      });

      if (!exists) {
        result.push(category);
      }
    });

    return result;
  }

  function getCustomCategoryRu(category) {
    if (category && typeof category === "object") {
      return String(category.nameRu || category.name || category.title || "").trim();
    }

    return String(category || "").trim();
  }

  function getCustomCategoryDe(category) {
    if (category && typeof category === "object") {
      return String(category.nameDe || "").trim();
    }

    return "";
  }

  function findCustomCategory(category) {
    const categoryName = String(category || "").trim().toLowerCase();

    return customCategories.find(function(customCategory) {
      return getCustomCategoryRu(customCategory).toLowerCase() === categoryName ||
        getCustomCategoryDe(customCategory).toLowerCase() === categoryName;
    }) || null;
  }

  function normalizeCategoryRenames(value) {
    const result = {};
    const source = value && typeof value === "object" ? value : {};

    Object.keys(source).forEach(function(key) {
      const originalName = String(key || "").trim();
      const newName = String(source[key] || "").trim();

      if (originalName !== "" && newName !== "") {
        result[originalName] = newName;
      }
    });

    return result;
  }

  function initFirebase() {
    if (cloudReady) {
      return true;
    }

    if (!isFirebaseConfigured() || typeof firebase === "undefined" || !firebase.firestore || !firebase.auth) {
      setSyncStatus("Работает локально", "local");
      setAuthStatus("Работает локально", "local");
      return false;
    }

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      cloudDb = firebase.firestore();
      cloudAuth = firebase.auth();
      cloudReady = true;
      return true;
    } catch (error) {
      cloudReady = false;
      setSyncStatus("Ошибка синхронизации", "error");
      setAuthStatus("Ошибка синхронизации", "error");
      return false;
    }
  }

  function getCloudDocumentRef() {
    if (!initFirebase() || !currentFirebaseUser) {
      return null;
    }

    return cloudDb
      .collection("users")
      .doc(currentFirebaseUser.uid)
      .collection(cloudCollectionName)
      .doc(cloudDocumentId);
  }

  function updateAuthUi() {

    if (currentFirebaseUser) {

        emailInput.value = currentFirebaseUser.email || "";
      }

      if (passwordInput) {
        passwordInput.value = "";
      }

      setAuthStatus("Вход выполнен", "synced");
      return;
    }

    setAuthStatus("Работает локально", "local");
    setSyncStatus("Войдите для синхронизации", "local");
  }

    authListenerStarted = true;
    cloudAuth.onAuthStateChanged(function(user) {

  function getLocalSnapshot() {
    const snapshotChildren = uniqueList(safeParseJSON(localStorage.getItem("children"), children.length ? children : defaultChildren.slice()));
    const childData = {};

    snapshotChildren.forEach(function(child) {
      const savedData = safeParseJSON(localStorage.getItem(getStorageKey(child)), null);
      childData[child] = normalizeChildData(savedData || (child === currentChild ? {
        tasks: tasks,
        points: points,
        claimedRewards: claimedRewards,
        rewards: rewards,
        rewardRequests: rewardRequests,
        language: language,
        updatedAt: getNowIso()
      } : getInitialChildData()));
    });

    return {
      children: snapshotChildren,
      currentChild: localStorage.getItem("currentChild") || currentChild || snapshotChildren[0],
      childData: childData,
      rewards: normalizeRewards(safeParseJSON(localStorage.getItem("rewards"), rewards)),
      parentMode: localStorage.getItem("parentMode") === "true",
      expandedCategories: uniqueList(safeParseJSON(localStorage.getItem("expandedCategories"), expandedCategories)),
      activeTaskFilter: localStorage.getItem("activeTaskFilter") || activeTaskFilter,
      taskHistory: normalizeHistory(safeParseJSON(localStorage.getItem("taskHistory"), taskHistory)),
      starTransactions: normalizeStarTransactions(safeParseJSON(localStorage.getItem("starTransactions"), starTransactions)),
      categories: getAllCategoryObjects(),
      customCategories: uniqueCategories(safeParseJSON(localStorage.getItem("customCategories"), customCategories)),
      categoryRenames: normalizeCategoryRenames(safeParseJSON(localStorage.getItem("categoryRenames"), categoryRenames)),
      categoryRenamesDe: normalizeCategoryRenames(safeParseJSON(localStorage.getItem("categoryRenamesDe"), categoryRenamesDe)),
      removedStandardCategories: uniqueCategoryNames(safeParseJSON(localStorage.getItem("removedStandardCategories"), removedStandardCategories)),
      uncategorizedName: uncategorizedName,
      lastDailyResetDate: localStorage.getItem("lastDailyResetDate") || "",
      updatedAt: new Date().toISOString()
    };
  }

  function applySnapshotToLocal(snapshot) {
    if (!snapshot || typeof snapshot !== "object") {
      return false;
    }

    const snapshotChildren = uniqueList(snapshot.children);
    const nextChildren = snapshotChildren.length > 0 ? snapshotChildren : defaultChildren.slice();
    const nextCurrentChild = snapshot.currentChild && nextChildren.includes(snapshot.currentChild)
      ? snapshot.currentChild
      : nextChildren[0];
    const childData = snapshot.childData && typeof snapshot.childData === "object" ? snapshot.childData : {};
    customCategories = uniqueCategories(
      Array.isArray(snapshot.customCategories)
        ? snapshot.customCategories
        : (Array.isArray(snapshot.categories) ? snapshot.categories.filter(function(category) { return category && category.isDefault === false; }) : [])
    );
    categoryRenames = normalizeCategoryRenames(snapshot.categoryRenames);
    categoryRenamesDe = normalizeCategoryRenames(snapshot.categoryRenamesDe);
    removedStandardCategories = uniqueCategoryNames(snapshot.removedStandardCategories);

    localStorage.setItem("children", JSON.stringify(nextChildren));
    localStorage.setItem("currentChild", nextCurrentChild);
    localStorage.setItem("rewards", JSON.stringify(normalizeRewards(snapshot.rewards)));
    localStorage.setItem("parentMode", snapshot.parentMode === true ? "true" : "false");
    localStorage.setItem("expandedCategories", JSON.stringify(uniqueList(snapshot.expandedCategories || []).map(normalizeCategoryId)));
    localStorage.setItem("activeTaskFilter", snapshot.activeTaskFilter || "all");
    localStorage.setItem("taskHistory", JSON.stringify(normalizeHistory(snapshot.taskHistory)));
    localStorage.setItem("starTransactions", JSON.stringify(normalizeStarTransactions(snapshot.starTransactions)));
    localStorage.removeItem("taskReminderSettings");
    localStorage.setItem("customCategories", JSON.stringify(customCategories));
    localStorage.setItem("categories", JSON.stringify(getAllCategoryObjects()));
    localStorage.setItem("categoryRenames", JSON.stringify(categoryRenames));
    localStorage.setItem("categoryRenamesDe", JSON.stringify(categoryRenamesDe));
    localStorage.setItem("removedStandardCategories", JSON.stringify(removedStandardCategories));
    localStorage.setItem("lastDailyResetDate", snapshot.lastDailyResetDate || "");

    nextChildren.forEach(function(child) {
      localStorage.setItem(getStorageKey(child), JSON.stringify(normalizeChildData(childData[child] || getInitialChildData())));
    });

    return true;
  }

  async function loadFromCloud() {
    const docRef = getCloudDocumentRef();

    if (!docRef) {
      setSyncStatus("Войдите для синхронизации", "local");
      return null;
    }

    try {
      const doc = await docRef.get();

      if (!doc.exists) {
        setSyncStatus("В облаке нет данных", "local");
        return null;
      }

      const data = doc.data();

      if (!data || !Array.isArray(data.children)) {
        setSyncStatus("Работает локально", "local");
        return null;
      }

      setSyncStatus("Синхронизировано", "synced");
      return data;
    } catch (error) {
      setSyncStatus("Ошибка синхронизации", "error");
      return null;
    }
  }

  async function saveToCloud() {

    if (isApplyingCloudData) {
      return false;
    }

    if (!docRef) {
      setSyncStatus("Войдите для синхронизации", "local");
      return false;
    }

    try {
      await docRef.set(getLocalSnapshot());
      setSyncStatus("Синхронизировано", "synced");
      return true;
    } catch (error) {
      setSyncStatus("Ошибка синхронизации", "error");
      return false;

      alert("Войдите для синхронизации");
      return;
    }

  function createBackupPayload() {
    return {
      app: "Family Tasks",
      type: "family-tasks-backup",
      version: 1,
      exportedAt: new Date().toISOString(),
      data: getLocalSnapshot()
    };
  }

  function downloadBackup() {
    const backup = createBackupPayload();
    const backupDate = new Date().toISOString().slice(0, 10);
    const fileName = "family-tasks-backup-" + backupDate + ".json";
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const backupUrl = URL.createObjectURL(blob);
    const link = document.createElement("a");

    link.href = backupUrl;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    setTimeout(function() {
      URL.revokeObjectURL(backupUrl);
    }, 1000);
  }

  function openBackupFilePicker() {
    const input = document.getElementById("backupFileInput");

    if (!input) {
      return;
    }

    input.value = "";
    input.click();
  }

  function readBackupFile(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();

      reader.onload = function() {
        resolve(reader.result);
      };

      reader.onerror = function() {
        reject(reader.error);
      };

      reader.readAsText(file);
    });
  }

  function getBackupSnapshot(backup) {
    if (!backup || typeof backup !== "object") {
      return null;
    }

    if (backup.app === "Family Tasks" && backup.type === "family-tasks-backup" && backup.data) {
      return isValidBackupSnapshot(backup.data) ? backup.data : null;
    }

    return null;
  }

  function isValidBackupSnapshot(snapshot) {
    return Boolean(
      snapshot &&
      typeof snapshot === "object" &&
      Array.isArray(snapshot.children) &&
      snapshot.childData &&
      typeof snapshot.childData === "object"
    );
  }

  async function restoreBackupFromFile(event) {
    const input = event && event.target;
    const file = input && input.files && input.files[0];

    if (!file) {
      return;
    }

    try {
      const fileText = await readBackupFile(file);
      const backup = JSON.parse(fileText);
      const snapshot = getBackupSnapshot(backup);

      if (!snapshot) {
        alert("Файл резервной копии некорректный");
        return;
      }

      if (!confirm("Восстановить данные из резервной копии? Текущие данные будут заменены.")) {
        return;
      }

      isApplyingCloudData = true;
      applySnapshotToLocal(snapshot);
      isApplyingCloudData = false;

      await saveToCloud();
      loadChildren();
      loadData();
      alert("Резервная копия восстановлена");
    } catch (error) {
      alert("Файл резервной копии некорректный");
    } finally {
      if (input) {
        input.value = "";
      }

      isApplyingCloudData = false;
    }
  }

  function mergeSnapshots(localSnapshot, cloudSnapshot) {
    const localData = localSnapshot && typeof localSnapshot === "object" ? localSnapshot : getLocalSnapshot();
    const cloudData = cloudSnapshot && typeof cloudSnapshot === "object" ? cloudSnapshot : {};
    const mergedChildren = uniqueList([].concat(localData.children || [], cloudData.children || []));
    const mergedChildData = {};

    mergedChildren.forEach(function(child) {
      mergedChildData[child] = mergeChildData(
        localData.childData && localData.childData[child],
        cloudData.childData && cloudData.childData[child]
      );
    });

    return {
      children: mergedChildren,
      currentChild: mergedChildren.includes(localData.currentChild) ? localData.currentChild : mergedChildren[0],
      childData: mergedChildData,
      rewards: mergeRewards(localData.rewards, cloudData.rewards),
      parentMode: localData.parentMode === true,
      expandedCategories: uniqueList([].concat(localData.expandedCategories || [], cloudData.expandedCategories || [])).map(normalizeCategoryId),
      activeTaskFilter: localData.activeTaskFilter || cloudData.activeTaskFilter || "today",
      taskHistory: mergeByKey(localData.taskHistory || [], cloudData.taskHistory || [], function(entry) {
        return [entry.child, entry.task, entry.points, entry.date].join("|");
      }),
      starTransactions: mergeByKey(localData.starTransactions || [], cloudData.starTransactions || [], function(entry) {
        return entry.id || [entry.child, entry.type, entry.amount, entry.title, entry.date].join("|");
      }),
      categories: getAllCategoryObjects(),
      customCategories: mergeCustomCategories(localData.customCategories, cloudData.customCategories),
      categoryRenames: Object.assign({}, cloudData.categoryRenames || {}, localData.categoryRenames || {}),
      categoryRenamesDe: Object.assign({}, cloudData.categoryRenamesDe || {}, localData.categoryRenamesDe || {}),
      removedStandardCategories: uniqueCategoryNames([].concat(localData.removedStandardCategories || [], cloudData.removedStandardCategories || [])),
      uncategorizedName: uncategorizedName,
      lastDailyResetDate: [localData.lastDailyResetDate || "", cloudData.lastDailyResetDate || ""].sort().pop() || "",
      updatedAt: getNowIso()
    };
  }

  function mergeChildData(localChildData, cloudChildData) {
    if (!localChildData) {
      return normalizeChildData(cloudChildData || getInitialChildData());
    }

    if (!cloudChildData) {
      return normalizeChildData(localChildData || getInitialChildData());
    }

    const localData = normalizeChildData(localChildData || getInitialChildData());
    const cloudData = normalizeChildData(cloudChildData || getInitialChildData());
    const localUpdatedAt = getItemUpdatedAt(localData);
    const cloudUpdatedAt = getItemUpdatedAt(cloudData);
    let mergedPoints = Math.max(localData.points, cloudData.points);

    if (localUpdatedAt && cloudUpdatedAt) {
      mergedPoints = cloudUpdatedAt > localUpdatedAt ? cloudData.points : localData.points;
    }

    return {
      tasks: mergeTasks(localData.tasks, cloudData.tasks),
      points: mergedPoints,
      claimedRewards: uniqueList([].concat(localData.claimedRewards || [], cloudData.claimedRewards || [])),
      rewards: mergeRewards(localData.rewards, cloudData.rewards),
      rewardRequests: mergeByKey(localData.rewardRequests || [], cloudData.rewardRequests || [], function(request) {
        return request.id || [request.child, request.rewardId, request.status, request.createdAt].join("|");
      }),
      language: (cloudUpdatedAt > localUpdatedAt ? cloudData.language : localData.language) || "ru",
      updatedAt: new Date(Math.max(localUpdatedAt, cloudUpdatedAt, Date.now())).toISOString()
    };
  }

  function mergeTasks(localTasks, cloudTasks) {
    return mergeByKeyLocalWins(localTasks || [], cloudTasks || [], getTaskMergeKey);
  }

  function getTaskMergeKey(task) {
    return "title:" + normalizeTaskTitle(task && (task.titleRu || task.title || task.text || "")) + "|" + getTaskCategoryId(task);
  }

  function mergeRewards(localRewards, cloudRewards) {
    return mergeByKeyLocalWins(localRewards || [], cloudRewards || [], function(reward) {
      return reward.id ? "id:" + reward.id : "title:" + normalizeTaskTitle(reward.title) + "|" + reward.cost;
    });
  }

  function mergeCustomCategories(localCategories, cloudCategories) {
    return uniqueCategories([].concat(localCategories || [], cloudCategories || [])).sort(function(first, second) {
      return getCustomCategoryRu(first).localeCompare(getCustomCategoryRu(second));
    });
  }

  function mergeByKey(localItems, cloudItems, getKey) {
    const mergedMap = new Map();

    (cloudItems || []).forEach(function(item) {
      if (!item) {
        return;
      }

      mergedMap.set(getKey(item), item);
    });

    (localItems || []).forEach(function(item) {
      if (!item) {
        return;
      }

      const key = getKey(item);
      mergedMap.set(key, chooseNewerItem(item, mergedMap.get(key)));
    });

    return Array.from(mergedMap.values());
  }

  function mergeByKeyLocalWins(localItems, cloudItems, getKey) {
    const mergedMap = new Map();

    (cloudItems || []).forEach(function(item) {
      if (!item) {
        return;
      }

      mergedMap.set(getKey(item), item);
    });

    (localItems || []).forEach(function(item) {
      if (!item) {
        return;
      }

      mergedMap.set(getKey(item), item);
    });

    return Array.from(mergedMap.values());
  }

  function getInitialChildData() {
    return {
      tasks: getDefaultTasks(),
      points: 0,
      claimedRewards: [],
      rewards: getDefaultRewards(),
      rewardRequests: [],
      language: "ru",
      updatedAt: getNowIso()
    };
  }

  function normalizeChildData(data) {
    const childData = data && typeof data === "object" ? data : getInitialChildData();
    const normalizedPoints = Number(childData.points);
    const hasSavedTaskList = Array.isArray(childData.tasks);
    const rawTasks = hasSavedTaskList ? childData.tasks : getDefaultTasks();
    let normalizedTasks = normalizeTasks(rawTasks);
    const rewardSource = Array.isArray(childData.rewards)
      ? childData.rewards
      : (Array.isArray(childData.availableRewards) ? childData.availableRewards : rewards);

    if (rawTasks.length > 0 && normalizedTasks.length === 0) {
      normalizedTasks = getDefaultTasks();
    }

    return {
      tasks: normalizedTasks,
      points: normalizedPoints > 0 ? normalizedPoints : 0,
      claimedRewards: Array.isArray(childData.claimedRewards) ? childData.claimedRewards : [],
      rewards: normalizeRewards(rewardSource),
      rewardRequests: normalizeRewardRequests(childData.rewardRequests),
      language: childData.language === "de" ? "de" : "ru",
      updatedAt: childData.updatedAt || ""
    };
  }

  function getDefaultRewards() {
    return [
      { id: "youtube30", title: "30 минут YouTube", cost: 30 },
      { id: "smallGift", title: "Маленький подарок", cost: 100 },
      { id: "familyCafe", title: "Семейная прогулка/кафе", cost: 200 }
    ];
  }

  function normalizeRewards(rewardList) {
    const normalizedRewards = Array.isArray(rewardList) ? rewardList
      .map(function(reward, index) {
        const title = String(reward && reward.title || "").trim();
        const cost = Number(reward && reward.cost);

        if (title === "" || cost <= 0) {
          return null;
        }

        return {
          id: String(reward.id || "reward" + index),
          title: title,
          cost: cost,
          updatedAt: reward.updatedAt || ""
        };
      })
      .filter(Boolean)
      .filter(function(reward, index, source) {
        return source.findIndex(function(otherReward) {
          return otherReward.id === reward.id;
        }) === index;
      }) : [];

    return Array.isArray(rewardList) ? normalizedRewards : getDefaultRewards();
  }

  function normalizeRewardRequests(requestList) {
    if (!Array.isArray(requestList)) {
      return [];
    }

    return requestList
      .map(function(request, index) {
        const child = String(request && request.child || "").trim();
        const rewardId = String(request && request.rewardId || "").trim();
        const rewardTitle = String(request && request.rewardTitle || "").trim();
        const cost = Number(request && request.cost);
        const status = ["pending", "approved", "rejected"].includes(request && request.status)
          ? request.status
          : "pending";
        const createdAt = String(request && request.createdAt || "").trim();

        if (child === "" || rewardId === "" || rewardTitle === "" || cost <= 0) {
          return null;
        }

        return {
          id: String(request.id || "request_" + index + "_" + Date.now()),
          child: child,
          rewardId: rewardId,
          rewardTitle: rewardTitle,
          cost: cost,
          status: status,
          createdAt: createdAt || new Date().toISOString()
        };
      })
      .filter(Boolean);
  }

  function normalizeHistory(historyList) {
    if (!Array.isArray(historyList)) {
      return [];
    }

    return historyList
      .map(function(entry) {
        const child = String(entry && entry.child || "").trim();
        const task = String(entry && entry.task || "").trim();
        const points = Number(entry && entry.points);
        const date = String(entry && entry.date || "").trim();

        if (child === "" || task === "" || points <= 0 || date === "") {
          return null;
        }

        return {
          child: child,
          task: task,
          points: points,
          date: date
        };
      })
      .filter(Boolean);
  }

  function normalizeStarTransactions(transactionList) {
    if (!Array.isArray(transactionList)) {
      return [];
    }

    return transactionList
      .map(function(entry) {
        const child = String(entry && entry.child || "").trim();
        const type = String(entry && entry.type || "").trim();
        const amount = Number(entry && entry.amount);
        const title = String(entry && entry.title || "").trim();
        const date = String(entry && entry.date || "").trim();
        const allowedTypes = ["earn", "spend", "reset", "refund"];

        if (child === "" || !allowedTypes.includes(type) || !Number.isFinite(amount) || title === "" || date === "") {
          return null;
        }

        return {
          id: String(entry.id || "star_" + date + "_" + child + "_" + type + "_" + Math.random().toString(16).slice(2)),
          child: child,
          type: type,
          amount: amount,
          title: title,
          date: date
        };
      })
      .filter(Boolean);
  }

      (translations.ru && translations.ru[key]) ||

  function translateFrequency(frequency) {
    const value = String(frequency || "").trim();
    const lowerValue = value.toLowerCase();

    if (!value) {
      return "";
    }

    if (lowerValue.includes("ежеднев")) {
      return t("daily").toLowerCase();
    }

    if (lowerValue.includes("2–3") || lowerValue.includes("2-3")) {
      return t("fewWeekly");
    }

    if (lowerValue.includes("1 раз")) {
      return t("weekly");
    }

    if (lowerValue.includes("по факту")) {
      return t("fact");
    }

    return value;
  }

  function normalizeCategoryName(category) {
    const value = String(category || "").trim();

    if (value.indexOf("cat_") === 0) {
      const categoryObject = getCategoryById(value);
      return categoryObject ? categoryObject.nameRu : uncategorizedName;
    }

    const lowerValue = value.toLowerCase();
    const categoryAliases = {
      "0 этаж": "0 ЭТАЖ — гараж, вход, постирочная",
      "0 этаж — гараж, вход, постирочная": "0 ЭТАЖ — гараж, вход, постирочная",
      "утро": "УТРО",
      "утренние задачи": "УТРО",

      "вечерние задачи": "ВЕЧЕР",

      "1 этаж — столовая": "1 ЭТАЖ — кухня, столовая, гостиная",
      "1 этаж — кухня": "1 ЭТАЖ — кухня, столовая, гостиная",
      "1 этаж — гостиная": "1 ЭТАЖ — кухня, столовая, гостиная",
      "1 этаж — кухня, столовая, гостиная": "1 ЭТАЖ — кухня, столовая, гостиная",
      "санузел 1 этаж": "1 ЭТАЖ — санузел",
      "1 этаж — санузел": "1 ЭТАЖ — санузел",
      "туалет 1 этаж": "1 ЭТАЖ — санузел",
      "2 этаж": "2 ЭТАЖ — спальни и утренний порядок",
      "2 этаж — спальни": "2 ЭТАЖ — спальни и утренний порядок",
      "2 этаж — спальни и утренний порядок": "2 ЭТАЖ — спальни и утренний порядок",
      "ванная 2 этаж": "2 ЭТАЖ — ванная",
      "2 этаж — ванная": "2 ЭТАЖ — ванная",
      "общие задачи": "ОБЩИЕ ЗАДАЧИ",
      "учёба и развитие": "УЧЁБА И РАЗВИТИЕ",
      "учеба и развитие": "УЧЁБА И РАЗВИТИЕ",
      "улица и двор": "УЛИЦА И ДВОР",
      "без категории": uncategorizedName
    };

    if (categoryAliases[lowerValue]) {
      return normalizeKnownCategory(categoryAliases[lowerValue]);
    }

    const matchedCategory = categoryOrder.find(function(knownCategory) {
      return knownCategory.toLowerCase() === lowerValue;
    });

    if (matchedCategory) {
      return normalizeKnownCategory(matchedCategory);
    }

    const matchedRenamedCategory = Object.keys(categoryRenames).find(function(originalCategory) {
      return String(categoryRenames[originalCategory] || "").toLowerCase() === lowerValue;
    });

    if (matchedRenamedCategory) {
      return normalizeKnownCategory(matchedRenamedCategory);
    }

    const matchedCustomCategory = findCustomCategory(lowerValue);

    if (matchedCustomCategory) {
      return getCustomCategoryRu(matchedCustomCategory);
    }

    return uncategorizedName;
  }

    return defaultCategories.find(function(category) {

    }) || null;

  function getCustomCategoryId(customCategory) {
    if (customCategory && typeof customCategory === "object" && customCategory.id) {
      return customCategory.id;
    }

    return "cat_custom_" + normalizeTaskTitle(getCustomCategoryRu(customCategory)).replace(/\s+/g, "_");
  }

  function getCategoryById(categoryId) {
    const defaultCategory = getDefaultCategoryById(categoryId);

    if (defaultCategory && !removedStandardCategories.includes(defaultCategory.nameRu)) {
      return Object.assign({}, defaultCategory, {
        nameRu: categoryRenames[defaultCategory.nameRu] || defaultCategory.nameRu,
        nameDe: categoryRenamesDe[defaultCategory.nameRu] || defaultCategory.nameDe
      });
    }

    const customCategory = customCategories.find(function(category) {
      return getCustomCategoryId(category) === categoryId;
    });

    if (customCategory) {
      return {
        id: getCustomCategoryId(customCategory),
        nameRu: getCustomCategoryRu(customCategory),
        nameDe: getCustomCategoryDe(customCategory),
        isDefault: false,
        order: Number(customCategory.order) || 100
      };
    }

    return categoryId === "cat_uncategorized" ? getDefaultCategoryById("cat_uncategorized") : null;
  }

  function getCategoryIdByName(categoryName) {
    const normalizedName = String(categoryName || "").trim().toLowerCase();
    const defaultCategory = defaultCategories.find(function(category) {
      return category.nameRu.toLowerCase() === normalizedName ||
        String(categoryRenames[category.nameRu] || "").toLowerCase() === normalizedName;
    });

    if (defaultCategory && !removedStandardCategories.includes(defaultCategory.nameRu)) {
      return defaultCategory.id;
    }

    const customCategory = findCustomCategory(normalizedName);
    return customCategory ? getCustomCategoryId(customCategory) : "cat_uncategorized";
  }

  function getAllCategoryObjects() {
    const standardCategories = defaultCategories
      .filter(function(category) {
        return category.id !== "cat_uncategorized" && !removedStandardCategories.includes(category.nameRu);
      })
      .map(function(category) {
        return Object.assign({}, category, {
          nameRu: categoryRenames[category.nameRu] || category.nameRu,
          nameDe: categoryRenamesDe[category.nameRu] || category.nameDe
        });
      });
    const customCategoryObjects = uniqueCategories(customCategories).map(function(category, index) {
      return {
        id: getCustomCategoryId(category),
        nameRu: getCustomCategoryRu(category),
        nameDe: getCustomCategoryDe(category),
        isDefault: false,
        order: 100 + index
      };
    });

    return standardCategories.concat(customCategoryObjects, [getDefaultCategoryById("cat_uncategorized")]);
  }

  function getCategoryName(categoryId) {
    const category = getCategoryById(normalizeCategoryId(categoryId));

    if (!category) {
      return getCurrentChildLanguage() === "de" ? "Ohne Kategorie" : uncategorizedName;
    }

    if (getCurrentChildLanguage() === "de") {
      return category.nameDe || category.nameRu;
    }

    return category.nameRu;
  }

  function normalizeKnownCategory(category) {
    const originalCategory = String(category || "").trim();

    if (removedStandardCategories.includes(originalCategory)) {
      return uncategorizedName;
    }

    return categoryRenames[originalCategory] || originalCategory;
  }

    return categoryOrder.find(function(standardCategory) {

        !removedStandardCategories.includes(standardCategory) &&
        (standardCategory.toLowerCase() === categoryName || String(categoryRenames[standardCategory] || "").toLowerCase() === categoryName);

    return getAllCategoryObjects().some(function(existingCategory) {
      return existingCategory.nameRu.toLowerCase() === categoryName ||
        String(existingCategory.nameDe || "").toLowerCase() === categoryName;
    });

  function categoryExistsExcept(category, excludedCategory) {
    const categoryName = String(category || "").trim().toLowerCase();
    const excludedName = String(excludedCategory || "").trim().toLowerCase();

    return getAllCategoryObjects().some(function(existingCategory) {
      const existingNames = [
        existingCategory.nameRu.toLowerCase(),
        String(existingCategory.nameDe || "").toLowerCase()
      ];
      return existingNames.includes(categoryName) && !existingNames.includes(excludedName);

  function saveCustomCategories() {
    customCategories = uniqueCategories(customCategories).filter(function(category) {
      const categoryName = getCustomCategoryRu(category);
      return !categoryOrder.some(function(standardCategory) {
        return standardCategory.toLowerCase() === categoryName.toLowerCase();
      });
    });
    removedStandardCategories = uniqueCategoryNames(removedStandardCategories).filter(function(category) {
      return categoryOrder.includes(category) && category !== uncategorizedName;
    });
    Object.keys(categoryRenames).forEach(function(category) {
      if (removedStandardCategories.includes(category) || !categoryOrder.includes(category)) {
        delete categoryRenames[category];
      }
    });
    Object.keys(categoryRenamesDe).forEach(function(category) {
      if (removedStandardCategories.includes(category) || !categoryOrder.includes(category)) {
        delete categoryRenamesDe[category];
      }
    });
    localStorage.setItem("customCategories", JSON.stringify(customCategories));
    localStorage.setItem("categories", JSON.stringify(getAllCategoryObjects()));
    localStorage.setItem("categoryRenames", JSON.stringify(categoryRenames));
    localStorage.setItem("categoryRenamesDe", JSON.stringify(categoryRenamesDe));
    localStorage.setItem("removedStandardCategories", JSON.stringify(removedStandardCategories));
    scheduleCloudSave();
  }

  function replaceCategoryInStoredChildren(oldCategory, newCategory) {
    const oldCategoryId = normalizeCategoryId(oldCategory);
    const newCategoryId = normalizeCategoryId(newCategory);
    const newCategoryName = normalizeCategoryName(newCategoryId);

    children.forEach(function(child) {
      if (child === currentChild) {
        return;
      }

      const storageKey = getStorageKey(child);
      const data = normalizeChildData(safeParseJSON(localStorage.getItem(storageKey), getInitialChildData()));
      let hasChanges = false;

      data.tasks = data.tasks.map(function(task) {
        const rawCategory = String(task.category || "").trim().toLowerCase();
        const shouldReplace = getTaskCategoryId(task) === oldCategoryId ||
          normalizeCategoryName(task.category) === normalizeCategoryName(oldCategory) ||
          rawCategory === String(oldCategory || "").trim().toLowerCase();

        if (!shouldReplace) {
          return task;
        }

        hasChanges = true;
        return Object.assign({}, task, { categoryId: newCategoryId, category: newCategoryName });
      });

      if (hasChanges) {
        localStorage.setItem(storageKey, JSON.stringify(data));
      }
    });
  }

    customCategories.push({

      nameRu: categoryName,
      nameDe: categoryNameDe,
      isDefault: false,
      order: 100 + customCategories.length,
      updatedAt: getNowIso()

  function saveCategoryEdit(categoryItem) {
    if (!isParentMode || categoryItem.type === "uncategorized") {
      return;
    }

    const input = document.getElementById("categoryEditInputRu");
    const deInput = document.getElementById("categoryEditInputDe");
    const trimmedName = input ? input.value.trim() : "";
    const trimmedNameDe = deInput ? deInput.value.trim() : "";

    if (trimmedName === "") {
      editingCategoryKey = null;
      renderCategoryManagement();
      return;
    }

    if (trimmedName !== categoryItem.name && categoryExistsExcept(trimmedName, categoryItem.name)) {
      alert("Такая категория уже существует");
      return;
    }

    if (categoryItem.type === "standard") {
      const defaultCategory = getDefaultCategoryById(categoryItem.id);
      if (defaultCategory) {
        categoryRenames[defaultCategory.nameRu] = trimmedName;
        categoryRenamesDe[defaultCategory.nameRu] = trimmedNameDe;
      }
    } else {
      customCategories = customCategories.map(function(customCategory) {
        return getCustomCategoryId(customCategory) === categoryItem.id
          ? Object.assign({}, customCategory, { nameRu: trimmedName, nameDe: trimmedNameDe, updatedAt: getNowIso() })
          : customCategory;
      });
    }

    editingCategoryKey = null;
    saveCustomCategories();
    saveData();
    saveExpandedCategories();
    updateCategoryInputs();
    renderCategoryManagement();
    renderTasks();
  }

  function deleteCategoryItem(categoryItem) {
    if (!isParentMode || categoryItem.type === "uncategorized") {
      return;
    }

    const message = categoryItem.type === "standard"
      ? "Это стандартная категория. Лучше не удалять. Перенести задачи в Без категории?"
      : "Перенести задачи из этой категории в Без категории?";

    if (!confirm(message)) {
      return;
    }

    replaceCategoryInStoredChildren(categoryItem.id, "cat_uncategorized");
    tasks = tasks.map(function(task) {
      return getTaskCategoryId(task) === categoryItem.id
        ? Object.assign({}, task, { categoryId: "cat_uncategorized", category: uncategorizedName })
        : task;
    });

    if (categoryItem.type === "standard") {
      const defaultCategory = getDefaultCategoryById(categoryItem.id);
      if (defaultCategory) {
        removedStandardCategories.push(defaultCategory.nameRu);
        delete categoryRenames[defaultCategory.nameRu];
        delete categoryRenamesDe[defaultCategory.nameRu];
      }
    } else {
      customCategories = customCategories.filter(function(customCategory) {
        return getCustomCategoryId(customCategory) !== categoryItem.id;
      });
    }

    expandedCategories = expandedCategories.filter(function(expandedCategory) {
      return expandedCategory !== categoryItem.id;
    });

    saveCustomCategories();
    saveData();
    saveExpandedCategories();
    updateCategoryInputs();
    renderCategoryManagement();
    renderTasks();

  function taskMatchesFilter(task) {
    const frequency = String(task.frequency || "").toLowerCase();

    if (activeTaskFilter === "today") {
      return !task.done;
    }

    if (activeTaskFilter === "daily") {
      return frequency === "ежедневно";
    }

    if (activeTaskFilter === "fewWeekly") {
      return frequency === "2–3 раза в неделю" || frequency === "2-3 раза в неделю";
    }

    if (activeTaskFilter === "weekly") {
      return frequency === "1 раз в неделю";
    }

    if (activeTaskFilter === "done") {
      return task.done;
    }

    if (activeTaskFilter === "todo") {
      return !task.done;
    }

    return true;
  }

      .filter(function(entry) {

      }, 0);
    const weekTotal = taskHistory
      .filter(function(entry) {
        const entryDate = parseDateString(entry.date);
        const today = parseDateString(getTodayString());

        if (!entryDate || !today || entry.child !== currentChild) {
          return false;

  function applyTaskTemplateUpdates(taskList) {
    const updatedTasks = taskList.slice();

    taskTemplateUpdates.forEach(function(templateTask) {
      const templateCategoryId = normalizeCategoryId(templateTask.category);
      const templateCategoryName = normalizeCategoryName(templateCategoryId);
      const namesToMatch = [templateTask.text].concat(templateTask.aliases || []);
      const matchIndex = updatedTasks.findIndex(function(task) {
        const taskTitle = task.titleRu || task.text || task.title || "";
        return namesToMatch.includes(taskTitle) || namesToMatch
          .map(normalizeTaskName)
          .includes(normalizeTaskName(taskTitle));
      });

      if (matchIndex === -1) {
        updatedTasks.push({
          text: templateTask.text,
          titleRu: templateTask.text,
          titleDe: templateTask.titleDe || "",
          points: templateTask.points,
          frequency: templateTask.frequency,
          categoryId: templateCategoryId,
          category: templateCategoryName,
          icon: templateTask.icon || getTaskIcon(templateTask),
          done: false,
          lastCompletedAt: null,
          completedPoints: null
        });
      } else {
        updatedTasks[matchIndex] = {
          text: templateTask.text,
          titleRu: templateTask.text,
          titleDe: updatedTasks[matchIndex].titleDe || templateTask.titleDe || "",
          points: templateTask.points,
          frequency: templateTask.frequency,
          categoryId: templateCategoryId,
          category: templateCategoryName,
          icon: updatedTasks[matchIndex].icon || templateTask.icon || getTaskIcon(templateTask),
          done: updatedTasks[matchIndex].done,
          lastCompletedAt: updatedTasks[matchIndex].lastCompletedAt || null,
          completedPoints: updatedTasks[matchIndex].completedPoints || null
        };
      }
    });

    return updatedTasks.filter(function(task, index) {
      const normalizedTaskName = normalizeTaskName(task.titleRu || task.text || task.title);
      const isOldAlias = taskTemplateUpdates.some(function(templateTask) {
        return normalizeTaskName(templateTask.text) !== normalizedTaskName &&
          (templateTask.aliases || []).map(normalizeTaskName).includes(normalizedTaskName);
      });

      if (isOldAlias) {
        return false;
      }

      return updatedTasks.findIndex(function(otherTask) {
        return normalizeTaskName(otherTask.titleRu || otherTask.text || otherTask.title) === normalizeTaskName(task.titleRu || task.text || task.title);
      }) === index;
    });
  }

  function applyTaskTemplateUpdatesForAllChildren() {
    children.forEach(function(child) {
      const storageKey = getStorageKey(child);
      const savedData = localStorage.getItem(storageKey);

      if (!savedData) {
        const initialData = getInitialChildData();
        const resetInitialData = resetTasksByFrequency(applyTaskTemplateUpdates(initialData.tasks));
        initialData.tasks = resetInitialData.tasks;
        localStorage.setItem(storageKey, JSON.stringify(initialData));
        return;
      }

      const data = normalizeChildData(safeParseJSON(savedData, getInitialChildData()));
      const resetResult = resetTasksByFrequency(applyTaskTemplateUpdates(data.tasks));
      data.tasks = resetResult.tasks;
      localStorage.setItem(storageKey, JSON.stringify(data));
    });
  }

  function migrateTaskTranslations() {
    let changed = false;

    children.forEach(function(child) {
      const storageKey = getStorageKey(child);
      const rawData = safeParseJSON(localStorage.getItem(storageKey), getInitialChildData());
      const data = normalizeChildData(rawData);
      let childChanged = false;

      data.tasks = data.tasks.map(function(task) {
        const ruTitle = String(task.titleRu || task.title || task.text || "").trim();
        const deTitle = getStandardTaskTranslation(ruTitle);
        const updatedTask = Object.assign({}, task);

        if (!updatedTask.titleRu && ruTitle) {
          updatedTask.titleRu = ruTitle;
          updatedTask.text = ruTitle;
          childChanged = true;
        }

        if (!updatedTask.text && ruTitle) {
          updatedTask.text = ruTitle;
          childChanged = true;
        }

        if (!updatedTask.titleDe && deTitle) {
          updatedTask.titleDe = deTitle;
          childChanged = true;
        }

        return updatedTask;
      });

      const nextDataString = JSON.stringify(data);
      const currentDataString = localStorage.getItem(storageKey);

      if (childChanged || nextDataString !== currentDataString) {
        localStorage.setItem(storageKey, nextDataString);
        changed = true;

        if (child === currentChild && tasks.length > 0) {
          tasks = data.tasks;
          points = data.points;
          claimedRewards = data.claimedRewards;
          rewardRequests = data.rewardRequests;
          rewards = data.rewards;
          language = data.language;
        }
      }
    });

    if (changed) {
      saveChildren();
      saveToCloud();
    }

    return changed;
  }

  function migrateChildNames() {
    const oldName = "Олеся";
    const newName = "Алеся";

    if (!children.includes(oldName)) {
      return;
    }

    const oldKey = getStorageKey(oldName);
    const newKey = getStorageKey(newName);
    const oldData = localStorage.getItem(oldKey);
    const newData = localStorage.getItem(newKey);

    children = children.map(function(child) {
      return child === oldName ? newName : child;
    }).filter(function(child, index, list) {
      return list.indexOf(child) === index;
    });

    if (oldData && !newData) {
      localStorage.setItem(newKey, oldData);
    }

    localStorage.removeItem(oldKey);

    if (currentChild === oldName) {
      currentChild = newName;
    }
  }

  function renderRanking() {
    const rankingList = document.getElementById("rankingList");

    if (!rankingList) {
      return;
    }

    rankingList.innerHTML = "";

    const ranking = children.map(function(child) {
      return {
        child: child,
        points: getChildPoints(child)
      };
    }).sort(function(first, second) {
      return second.points - first.points || first.child.localeCompare(second.child);
    });

    ranking.forEach(function(item, index) {
      const row = document.createElement("div");
      row.className = "ranking-item";

      if (index === 0 && ranking.length > 0) {
        row.classList.add("leader");
      }

      const name = document.createElement("span");
      name.className = "ranking-name";
      name.innerText = (index === 0 ? "1 место 👑 " : (index === 1 ? "2 место 🥈 " : (index === 2 ? "3 место 🥉 " : (index + 1) + " место "))) + item.child;

      const score = document.createElement("span");
      score.className = "ranking-points";
      score.innerText = item.points + " " + t("pointsWord");

      row.appendChild(name);
      row.appendChild(score);
      rankingList.appendChild(row);
    });
  }
